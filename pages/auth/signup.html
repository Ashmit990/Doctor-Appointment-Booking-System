<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healthcare | Premium Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #f8fafb;
        margin: 0;
        padding: 0;
      }

      .organic-bg {
        background: linear-gradient(135deg, #007e85 0%, #005f65 100%);
        clip-path: path(
          "M1000 0 L1000 1000 L300 1000 C150 1000 150 800 250 700 C400 550 50 600 50 350 C50 150 400 150 450 0 Z"
        );
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
      }

      .custom-input {
        transition: all 0.3s ease;
        border-bottom: 2px solid #e5e7eb;
      }

      .custom-input:focus {
        border-color: #007e85;
        padding-left: 4px;
      }

      .custom-input.input-error {
        border-bottom-color: #dc2626;
      }

      #doctorFieldsContainer {
        transition: all 0.4s ease-in-out;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
      }

      #doctorFieldsContainer.show {
        max-height: 600px;
        opacity: 1;
        margin-top: 1.25rem;
      }

      @keyframes float {
        0% {
          transform: translateY(0px) scale(1.1);
        }
        50% {
          transform: translateY(-20px) scale(1.1);
        }
        100% {
          transform: translateY(0px) scale(1.1);
        }
      }
      .float-hero {
        animation: float 6s ease-in-out infinite;
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideRight {
        0% {
          opacity: 0;
          transform: translateX(-30px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes modalFadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .animate-fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }
      .animate-slide-up {
        animation: slideUp 0.7s ease-out forwards;
      }
      .animate-slide-right {
        animation: slideRight 0.8s ease-out forwards;
      }

      /* Back Button Style - Arrow Only */
      .back-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(0, 126, 133, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 50px;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 1px solid rgba(0, 126, 133, 0.2);
      }
      .back-button:hover {
        background: rgba(0, 126, 133, 0.2);
        transform: translateX(-3px);
      }
      .back-button svg {
        width: 22px;
        height: 22px;
        color: #007e85;
      }

      /* Profession Modal Styles */
      .profession-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .profession-modal.show {
        display: flex;
      }
      .modal-content {
        background: white;
        border-radius: 24px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow: hidden;
        animation: modalFadeIn 0.3s ease-out;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }
      .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f8fafb;
      }
      .modal-body {
        padding: 20px 24px;
        max-height: 60vh;
        overflow-y: auto;
      }
      .modal-footer {
        padding: 16px 24px;
        border-top: 1px solid #e5e7eb;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        background: #f8fafb;
      }
      .profession-option-modal {
        padding: 12px 16px;
        margin: 8px 0;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #e5e7eb;
      }
      .profession-option-modal:hover {
        background: #007e85;
        color: white;
        border-color: #007e85;
        transform: translateX(5px);
      }
      .profession-option-modal.selected {
        background: #007e85;
        color: white;
        border-color: #007e85;
      }
      .selected-profession-display {
        background: #f1f5f9;
        padding: 12px 16px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #e2e8f0;
      }
      .selected-profession-display:hover {
        border-color: #007e85;
        background: #f8fafc;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #007e85;
        color: white;
        padding: 6px 12px;
        border-radius: 50px;
        font-size: 13px;
      }
    </style>
  </head>

  <body class="overflow-x-hidden tracking-[1.1px]">
    <!-- BACK BUTTON - Arrow Only -->
    <div class="back-button" onclick="goToLandingPage()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        />
      </svg>
    </div>

    <!-- Profession Selection Popup Modal -->
    <div id="professionModal" class="profession-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="text-xl font-bold text-[#007E85]">
            Select Specialization
          </h2>
          <button
            onclick="closeProfessionModal()"
            class="text-gray-400 hover:text-gray-600 transition"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="grid grid-cols-1 gap-2" id="professionOptionsList">
            <!-- Options will be populated here -->
          </div>
        </div>
        <div class="modal-footer">
          <button
            onclick="closeProfessionModal()"
            class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 transition"
          >
            Cancel
          </button>
          <button
            onclick="confirmProfessionSelection()"
            class="px-4 py-2 bg-[#007E85] text-white rounded-lg hover:bg-[#00666c] transition"
          >
            Confirm
          </button>
        </div>
      </div>
    </div>

    <div class="flex min-h-screen w-full relative animate-fade-in">
      <!-- Left Panel -->
      <div
        class="w-full lg:w-[45%] flex flex-col justify-center px-10 xl:px-24 z-20 relative bg-[#F8FAFB]"
      >
        <div class="max-w-md w-full mx-auto lg:mx-0 py-1">
          <!-- Logo -->
          <div class="mb-8 flex flex-col items-start">
            <div class="flex items-center gap-3 mb-6">
              <img
                src="../../src/assets/logo.svg"
                alt="Healthcare Logo"
                class="h-12 w-12"
              />
              <span class="text-2xl font-extrabold">
                <span class="text-[#007E85]">Health</span
                ><span class="text-[#6EAB36]">care</span>
              </span>
            </div>
            <p
              class="text-slate-500 font-medium text-[12px] xl:text-base mt-[-10px]"
            >
              <span>Create Account </span>
              <span>to join our community for world-class digital care.</span>
            </p>
          </div>

          <form id="signupForm" class="space-y-5 xl:space-y-6" novalidate>
            <!-- 1. Full Name -->
            <div class="group">
              <label
                class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >Full Name</label
              >
              <input
                id="signupFullName"
                type="text"
                class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                oninput="clearErr('signupFullName')"
              />
              <p
                id="signupFullName_err"
                class="hidden text-red-600 text-xs font-semibold mt-1"
              ></p>
            </div>

            <!-- 2. Age -->
            <div class="group">
              <label
                class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >Age</label
              >
              <input
                id="signupAge"
                type="number"
                class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                oninput="clearErr('signupAge')"
              />
              <p
                id="signupAge_err"
                class="hidden text-red-600 text-xs font-semibold mt-1"
              ></p>
            </div>

            <!-- 3. Email -->
            <div class="group">
              <label
                class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >Email Address</label
              >
              <input
                id="signupEmail"
                type="email"
                class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                oninput="clearErr('signupEmail')"
              />
              <p
                id="signupEmail_err"
                class="hidden text-red-600 text-xs font-semibold mt-1"
              ></p>
            </div>

            <!-- 4. Phone -->
            <div class="group">
              <label
                class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >Phone Number</label
              >
              <input
                id="signupPhone"
                type="tel"
                class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                oninput="clearErr('signupPhone')"
              />
              <p
                id="signupPhone_err"
                class="hidden text-red-600 text-xs font-semibold mt-1"
              ></p>
            </div>

            <!-- 5. Role -->
            <div class="relative group">
              <label
                class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >Register as</label
              >
              <button
                type="button"
                id="customSelectBtn"
                class="custom-input w-full flex justify-between items-center py-1.5 text-base xl:text-lg text-slate-800 outline-none"
              >
                <span id="selectedValue">Patient</span>
                <div
                  class="bg-slate-100 p-1 rounded-full group-hover:bg-[#007E85]/10 transition-colors"
                >
                  <svg
                    id="chevron"
                    class="w-4 h-4 text-[#007E85] transition-transform duration-300"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="3"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
              </button>
              <div
                id="dropdownMenu"
                class="hidden absolute left-0 w-full mt-2 glass-card rounded-xl overflow-hidden z-50 dropdown-animate opacity-0 -translate-y-2"
              >
                <div class="p-1.5 space-y-1">
                  <div
                    class="option-item flex items-center px-4 py-2.5 hover:bg-[#007E85] hover:text-white rounded-lg cursor-pointer transition-all"
                    data-value="patient"
                  >
                    <span class="font-bold text-sm">Patient</span>
                  </div>
                  <div
                    class="option-item flex items-center px-4 py-2.5 hover:bg-[#007E85] hover:text-white rounded-lg cursor-pointer transition-all"
                    data-value="doctor"
                  >
                    <span class="font-bold text-sm">Medical Professional</span>
                  </div>
                </div>
              </div>
            </div>

            <!-- Doctor Specific Fields -->
            <div id="doctorFieldsContainer">
              <!-- 6. Medical ID -->
              <div class="group mb-4">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                  >Medical ID <span class="text-red-500">*</span></label
                >
                <input
                  id="signupMedicalId"
                  type="text"
                  class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                  placeholder="Enter your medical registration ID"
                  oninput="clearErr('signupMedicalId')"
                />
                <p
                  id="signupMedicalId_err"
                  class="hidden text-red-600 text-xs font-semibold mt-1"
                ></p>
              </div>

              <!-- 6. Profession Selection (Modal Trigger) -->
              <div class="group">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                  >Profession / Specialization
                  <span class="text-red-500">*</span></label
                >
                <div
                  id="professionDisplay"
                  class="selected-profession-display"
                  onclick="openProfessionModal()"
                >
                  <span id="selectedProfessionText" class="text-gray-500"
                    >Click to select specialization</span
                  >
                  <svg
                    class="w-5 h-5 text-[#007E85]"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 9l-7 7-7-7"
                    />
                  </svg>
                </div>
                <input type="hidden" id="selectedProfessionValue" value="" />
                <p
                  id="signupProfession_err"
                  class="hidden text-red-600 text-xs font-semibold mt-1"
                ></p>
              </div>

              <!-- 7. Professional Bio -->
              <div class="group mt-4">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                  >Professional Bio <span class="text-red-500">*</span></label
                >
                <textarea
                  id="signupBio"
                  rows="3"
                  class="w-full p-3 rounded-xl border-2 border-slate-100 bg-slate-50 focus:border-[#007E85] focus:bg-white outline-none text-slate-800 text-sm transition-all resize-none shadow-inner"
                  placeholder="Describe your experience, qualifications, and specialties (minimum 15 words)..."
                  oninput="
                    updateBioWordCount();
                    clearErr('signupBio');
                  "
                ></textarea>
                <p
                  id="signupBio_err"
                  class="hidden text-red-600 text-xs font-semibold mt-1"
                ></p>
                <p class="text-xs text-gray-400 mt-1" id="bioWordCount">
                  0 words (minimum 15 required)
                </p>
              </div>
            </div>

            <!-- 8. Password -->
            <div class="group">
              <label
                class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >Create Password</label
              >
              <div class="relative">
                <input
                  id="signupPassword"
                  type="password"
                  class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none pr-10"
                  oninput="clearErr('signupPassword')"
                />
                <button
                  type="button"
                  onclick="togglePass()"
                  class="absolute right-0 bottom-2 text-[#007E85] hover:text-[#005f65]"
                  tabindex="-1"
                >
                  <svg
                    id="eyeIcon"
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-5 h-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                  </svg>
                </button>
              </div>
              <div
                class="mt-2 h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"
              >
                <div
                  id="strengthBar"
                  class="h-full rounded-full transition-all duration-500 w-0"
                ></div>
              </div>
              <p
                id="strengthLabel"
                class="text-xs mt-1 font-semibold text-slate-400"
              ></p>
              <p
                id="signupPassword_err"
                class="hidden text-red-600 text-xs font-semibold mt-1"
              ></p>
            </div>

            <!-- 9. Confirm Password -->
            <div class="group">
              <label
                class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >Confirm Password</label
              >
              <div class="relative">
                <input
                  id="signupConfirmPassword"
                  type="password"
                  class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none pr-10"
                  oninput="clearErr('signupConfirmPassword')"
                />
                <button
                  type="button"
                  onclick="toggleConfirmPass()"
                  class="absolute right-0 bottom-2 text-[#007E85] hover:text-[#005f65]"
                  tabindex="-1"
                >
                  <svg
                    id="confirmEyeIcon"
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-5 h-5"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                    />
                  </svg>
                </button>
              </div>
              <p
                id="signupConfirmPassword_err"
                class="hidden text-red-600 text-xs font-semibold mt-1"
              ></p>
            </div>

            <!-- Submit -->
            <div class="pt-2 mt-[-5px]">
              <button
                type="submit"
                id="submitBtn"
                class="w-full bg-[#007E85] text-white font-bold py-4 xl:py-5 rounded-xl text-base xl:text-lg shadow-lg hover:bg-[#00666c] transition-all hover:-translate-y-0.5 active:scale-[0.98]"
              >
                Register Now
              </button>
              <p class="text-center mt-4 text-slate-500 text-sm font-medium">
                Already have an account?
                <a
                  href="login.html"
                  class="text-[#007E85] font-bold hover:underline"
                  >sign in</a
                >
              </p>
            </div>
          </form>
        </div>
      </div>

      <!-- Right Panel -->
      <div
        class="hidden lg:block w-[55%] relative overflow-hidden bg-[#F8FAFB]"
      >
        <div class="absolute inset-0 organic-bg z-0 shadow-2xl"></div>
        <div
          class="relative h-full w-full flex items-center justify-center z-10 p-12"
        >
          <img
            src="../../src/assets/photo.png"
            alt="Healthcare Professional"
            class="h-[102%] object-contain transform scale-110 mt-10"
          />
        </div>
      </div>
    </div>

    <script src="../../src/js/scroll-animations.js"></script>
    <script>
      // Professions list
      const professions = [
        { icon: "🦷", name: "Dentist" },
        { icon: "🏥", name: "General Physician" },
        { icon: "🧴", name: "Dermatologist" },
        { icon: "👶", name: "Pediatrician" },
        { icon: "🧠", name: "Neurologist" },
        { icon: "❤️", name: "Cardiologist" },
        { icon: "🦴", name: "Orthopedic" },
        { icon: "👁️", name: "Ophthalmologist" },
        { icon: "🧠", name: "Psychiatrist" },
        { icon: "📋", name: "Radiologist" },
        { icon: "💉", name: "Anesthesiologist" },
        { icon: "🔬", name: "Pathologist" },
        { icon: "👩‍⚕️", name: "Gynecologist" },
        { icon: "🏥", name: "Emergency Medicine" },
        { icon: "📌", name: "Other" },
      ];

      let tempSelectedProfession = "";
      let finalSelectedProfession = "";

      // Populate profession modal
      function populateProfessionModal() {
        const container = document.getElementById("professionOptionsList");
        container.innerHTML = "";
        professions.forEach((prof) => {
          const div = document.createElement("div");
          div.className = "profession-option-modal";
          div.setAttribute("data-profession", prof.name);
          div.innerHTML = `<span class="text-xl">${prof.icon}</span><span class="font-medium">${prof.name}</span>`;
          div.onclick = () => selectProfessionInModal(prof.name, div);
          container.appendChild(div);
        });
      }

      function selectProfessionInModal(profession, element) {
        // Remove selected class from all
        document.querySelectorAll(".profession-option-modal").forEach((el) => {
          el.classList.remove("selected");
        });
        element.classList.add("selected");
        tempSelectedProfession = profession;
      }

      function openProfessionModal() {
        tempSelectedProfession = finalSelectedProfession;
        populateProfessionModal();
        // Highlight the previously selected one
        if (tempSelectedProfession) {
          document
            .querySelectorAll(".profession-option-modal")
            .forEach((el) => {
              if (
                el.getAttribute("data-profession") === tempSelectedProfession
              ) {
                el.classList.add("selected");
              }
            });
        }
        document.getElementById("professionModal").classList.add("show");
        document.body.style.overflow = "hidden";
      }

      function closeProfessionModal() {
        document.getElementById("professionModal").classList.remove("show");
        document.body.style.overflow = "";
      }

      function confirmProfessionSelection() {
        if (tempSelectedProfession) {
          finalSelectedProfession = tempSelectedProfession;
          document.getElementById("selectedProfessionText").innerHTML =
            `<span class="chip">${finalSelectedProfession}</span>`;
          document.getElementById("selectedProfessionValue").value =
            finalSelectedProfession;
          clearErr("signupProfession");
        }
        closeProfessionModal();
      }

      // Go to Landing Page
      function goToLandingPage() {
        window.location.href = "../../index.html";
      }

      // Role Dropdown logic
      const customSelectBtn = document.getElementById("customSelectBtn");
      const dropdownMenu = document.getElementById("dropdownMenu");
      const chevron = document.getElementById("chevron");
      const selectedValueDisplay = document.getElementById("selectedValue");
      const options = document.querySelectorAll(".option-item");
      const doctorFieldsContainer = document.getElementById(
        "doctorFieldsContainer",
      );

      customSelectBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const isHidden = dropdownMenu.classList.contains("hidden");
        if (isHidden) {
          dropdownMenu.classList.remove("hidden");
          setTimeout(() => {
            dropdownMenu.classList.remove("opacity-0", "-translate-y-2");
            dropdownMenu.classList.add("opacity-100", "translate-y-0");
          }, 10);
          chevron.classList.add("rotate-180");
        } else {
          closeRoleDropdown();
        }
      });

      function closeRoleDropdown() {
        dropdownMenu.classList.add("opacity-0", "-translate-y-2");
        dropdownMenu.classList.remove("opacity-100", "translate-y-0");
        chevron.classList.remove("rotate-180");
        setTimeout(() => dropdownMenu.classList.add("hidden"), 300);
      }

      let selectedRole = "Patient";

      options.forEach((option) => {
        option.addEventListener("click", () => {
          const val = option.getAttribute("data-value");
          selectedValueDisplay.innerText = option.innerText;
          selectedRole = option.innerText;
          if (val === "doctor") {
            doctorFieldsContainer.classList.add("show");
          } else {
            doctorFieldsContainer.classList.remove("show");
            // Reset profession when switching to patient
            finalSelectedProfession = "";
            document.getElementById("selectedProfessionText").innerHTML =
              "Click to select specialization";
            document.getElementById("selectedProfessionValue").value = "";
          }
          closeRoleDropdown();
        });
      });

      window.onclick = (e) => {
        if (customSelectBtn && !customSelectBtn.contains(e.target)) {
          closeRoleDropdown();
        }
      };

      // Bio word counter
      function updateBioWordCount() {
        const bioTextarea = document.getElementById("signupBio");
        const wordCountSpan = document.getElementById("bioWordCount");
        const text = bioTextarea.value.trim();
        const wordCount = text === "" ? 0 : text.split(/\s+/).length;
        wordCountSpan.textContent = `${wordCount} words (minimum 15 required)`;
        if (wordCount >= 15) {
          wordCountSpan.classList.add("text-green-600");
          wordCountSpan.classList.remove("text-red-500");
        } else {
          wordCountSpan.classList.remove("text-green-600");
          wordCountSpan.classList.add("text-red-500");
        }
      }

      // Password visibility toggle
      function togglePass() {
        const input = document.getElementById("signupPassword");
        const icon = document.getElementById("eyeIcon");
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        icon.style.opacity = show ? "0.45" : "1";
      }

      function toggleConfirmPass() {
        const input = document.getElementById("signupConfirmPassword");
        const icon = document.getElementById("confirmEyeIcon");
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        icon.style.opacity = show ? "0.45" : "1";
      }

      // Password strength meter
      document
        .getElementById("signupPassword")
        .addEventListener("input", function () {
          const v = this.value;
          const bar = document.getElementById("strengthBar");
          const lbl = document.getElementById("strengthLabel");
          let score = 0;
          if (v.length >= 8) score++;
          if (/[A-Z]/.test(v)) score++;
          if (/[0-9]/.test(v)) score++;
          if (/[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>\/?]/.test(v)) score++;
          const levels = [
            { w: "0", bg: "", label: "" },
            { w: "25%", bg: "bg-red-500", label: "Weak" },
            { w: "50%", bg: "bg-orange-400", label: "Fair" },
            { w: "75%", bg: "bg-yellow-400", label: "Good" },
            { w: "100%", bg: "bg-green-500", label: "Strong" },
          ];
          bar.className = "h-full rounded-full transition-all duration-500";
          bar.classList.add(levels[score].bg);
          bar.style.width = levels[score].w;
          const colors = [
            "text-slate-400",
            "text-red-500",
            "text-orange-400",
            "text-yellow-500",
            "text-green-600",
          ];
          lbl.className = `text-xs mt-1 font-semibold ${colors[score]}`;
          lbl.textContent = levels[score].label;
        });

      // Error helpers
      function showErr(id, msg) {
        const input = document.getElementById(id);
        const err = document.getElementById(id + "_err");
        if (input) input.classList.add("input-error");
        if (err) {
          err.textContent = msg;
          err.classList.remove("hidden");
        }
      }

      function clearErr(id) {
        const input = document.getElementById(id);
        const err = document.getElementById(id + "_err");
        if (input) input.classList.remove("input-error");
        if (err) {
          err.textContent = "";
          err.classList.add("hidden");
        }
      }

      // Validators
      const Validators = {
        fullName(v) {
          if (!v) return "Full name is required.";
          if (v.length < 2) return "Name must be at least 2 characters.";
          if (!/^[a-zA-Z\s\-']+$/.test(v))
            return "Name must contain letters only.";
          return null;
        },
        age(v) {
          if (!v) return "Age is required.";
          if (!/^\d+$/.test(v)) return "Age must be a whole number.";
          const n = parseInt(v, 10);
          if (n < 18) return "You must be at least 18 years old.";
          if (n > 120) return "Please enter a valid age.";
          return null;
        },
        email(v) {
          if (!v) return "Email address is required.";
          if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v))
            return "Enter a valid email address.";
          return null;
        },
        phone(v) {
          if (!v) return "Phone number is required.";
          const digits = v.replace(/[\s\-()]/g, "");
          if (!/^\d{10}$/.test(digits))
            return "Phone number must be exactly 10 digits.";
          return null;
        },
        profession(v) {
          if (!v) return "Please select your profession/specialization.";
          return null;
        },
        medicalId(v) {
          if (!v) return "Medical ID is required for medical professionals.";
          if (v.length < 4) return "Medical ID must be at least 4 characters.";
          if (!/^[a-zA-Z0-9_\/-]+$/.test(v))
            return "Medical ID can only contain letters, numbers, _, / or -.";
          return null;
        },
        password(v) {
          if (!v) return "Password is required.";
          if (v.length < 8) return "Password must be at least 8 characters.";
          if (!/[A-Z]/.test(v))
            return "Password must include an uppercase letter.";
          if (!/[0-9]/.test(v)) return "Password must include a number.";
          if (!/[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>\/?]/.test(v))
            return "Password must include a special character.";
          return null;
        },
        bio(v) {
          if (!v) return "Professional bio is required.";
          const wordCount = v.trim().split(/\s+/).length;
          if (wordCount < 15) return "Bio must contain at least 15 words.";
          return null;
        },
      };

      // Form submit
      document
        .getElementById("signupForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const fullName = document
            .getElementById("signupFullName")
            .value.trim();
          const age = document.getElementById("signupAge").value.trim();
          const email = document.getElementById("signupEmail").value.trim();
          const phone = document.getElementById("signupPhone").value.trim();
          const password = document.getElementById("signupPassword").value;
          const confirmPassword = document.getElementById(
            "signupConfirmPassword",
          ).value;
          const medicalId = document
            .getElementById("signupMedicalId")
            .value.trim();
          const bio = document.getElementById("signupBio").value.trim();
          const isDoctor = selectedRole === "Medical Professional";

          [
            "signupFullName",
            "signupAge",
            "signupEmail",
            "signupPhone",
            "signupPassword",
            "signupConfirmPassword",
            "signupMedicalId",
            "signupProfession",
            "signupBio",
          ].forEach(clearErr);

          let hasError = false;

          const nameErr = Validators.fullName(fullName);
          if (nameErr) {
            showErr("signupFullName", nameErr);
            hasError = true;
          }

          const ageErr = Validators.age(age);
          if (ageErr) {
            showErr("signupAge", ageErr);
            hasError = true;
          }

          const emailErr = Validators.email(email);
          if (emailErr) {
            showErr("signupEmail", emailErr);
            hasError = true;
          }

          const phoneErr = Validators.phone(phone);
          if (phoneErr) {
            showErr("signupPhone", phoneErr);
            hasError = true;
          }

          const passErr = Validators.password(password);
          if (passErr) {
            showErr("signupPassword", passErr);
            hasError = true;
          }

          if (!confirmPassword) {
            showErr("signupConfirmPassword", "Please confirm your password.");
            hasError = true;
          } else if (password !== confirmPassword) {
            showErr("signupConfirmPassword", "Passwords do not match.");
            hasError = true;
          }

          if (isDoctor) {
            const medicalIdErr = Validators.medicalId(medicalId);
            if (medicalIdErr) {
              showErr("signupMedicalId", medicalIdErr);
              hasError = true;
            }

            const profErr = Validators.profession(finalSelectedProfession);
            if (profErr) {
              showErr("signupProfession", profErr);
              hasError = true;
            }

            const bioErr = Validators.bio(bio);
            if (bioErr) {
              showErr("signupBio", bioErr);
              hasError = true;
            }
          }

          if (hasError) return;

          const btn = document.getElementById("submitBtn");
          const origText = btn.innerText;
          btn.innerText = "Registering...";
          btn.disabled = true;

          const formData = new FormData();
          formData.append("full_name", fullName);
          formData.append("email", email);
          formData.append("phone", phone);
          formData.append("age", age);
          formData.append("role", selectedRole);
          formData.append("password", password);
          if (isDoctor) {
            formData.append("medical_id", medicalId);
            formData.append("bio", bio);
            formData.append("profession", finalSelectedProfession);
          }

          fetch("../../api/auth/signup_process.php", {
            method: "POST",
            body: formData,
          })
            .then((r) => r.json())
            .then((data) => {
              btn.innerText = origText;
              btn.disabled = false;
              if (data.status === "success") {
                window.location.href = data.redirect || "login.html";
              } else {
                showErr("signupEmail", data.message || "Registration failed.");
              }
            })
            .catch(() => {
              btn.innerText = origText;
              btn.disabled = false;
              showErr("signupEmail", "Could not connect to the server.");
            });
        });
    </script>
  </body>
</html>
