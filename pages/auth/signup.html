<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healthcare | Premium Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #f8fafb;
        margin: 0;
        padding: 0;
      }

      .organic-bg {
        background: linear-gradient(135deg, #007e85 0%, #005f65 100%);
        clip-path: path(
          "M1000 0 L1000 1000 L300 1000 C150 1000 150 800 250 700 C400 550 50 600 50 350 C50 150 400 150 450 0 Z"
        );
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
      }

      .custom-input {
        transition: all 0.3s ease;
        border-bottom: 2px solid #e5e7eb;
      }
      .custom-input:focus {
        border-color: #007e85;
        padding-left: 4px;
      }
      .custom-input.input-error {
        border-bottom-color: #dc2626;
      }

      #doctorFieldsContainer {
        transition: all 0.4s ease-in-out;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
      }
      #doctorFieldsContainer.show {
        max-height: 600px;
        opacity: 1;
        margin-top: 1.25rem;
      }

      @keyframes float {
        0% {
          transform: translateY(0px) scale(1.1);
        }
        50% {
          transform: translateY(-20px) scale(1.1);
        }
        100% {
          transform: translateY(0px) scale(1.1);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes modalFadeIn {
        from {
          opacity: 0;
          transform: scale(0.92);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes stepFadeIn {
        from {
          opacity: 0;
          transform: translateX(20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .animate-fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }

      /* ── Back button ── */
      .back-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(0, 126, 133, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 50px;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 1px solid rgba(0, 126, 133, 0.2);
      }
      .back-button:hover {
        background: rgba(0, 126, 133, 0.2);
        transform: translateX(-3px);
      }
      .back-button svg {
        width: 22px;
        height: 22px;
        color: #007e85;
      }

      /* ── Profession modal ── */
      .profession-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(4px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      .profession-modal.show {
        display: flex;
      }
      .modal-content {
        background: white;
        border-radius: 24px;
        max-width: 500px;
        width: 90%;
        max-height: 80vh;
        overflow: hidden;
        animation: modalFadeIn 0.3s ease-out;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }
      .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f8fafb;
      }
      .modal-body {
        padding: 20px 24px;
        max-height: none;
        overflow-y: visible;
      }
      .modal-footer {
        padding: 16px 24px;
        border-top: 1px solid #e5e7eb;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        background: #f8fafb;
      }
      .profession-option-modal {
        padding: 12px 16px;
        margin: 8px 0;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #e5e7eb;
      }
      .profession-option-modal:hover,
      .profession-option-modal.selected {
        background: #007e85;
        color: white;
        border-color: #007e85;
        transform: translateX(5px);
      }
      .selected-profession-display {
        background: #f1f5f9;
        padding: 12px 16px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border: 1px solid #e2e8f0;
      }
      .selected-profession-display:hover {
        border-color: #007e85;
        background: #f8fafc;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #007e85;
        color: white;
        padding: 6px 12px;
        border-radius: 50px;
        font-size: 13px;
      }

      /* ── Step badges ── */
      .step-indicator {
        display: flex;
        gap: 12px;
        margin-bottom: 28px;
      }
      .step-badge {
        font-size: 12px;
        font-weight: 700;
        background: #e2e8f0;
        padding: 6px 16px;
        border-radius: 40px;
        color: #475569;
        transition: all 0.2s;
        letter-spacing: 0.5px;
      }
      .step-badge.active {
        background: #007e85;
        color: white;
        box-shadow: 0 2px 8px rgba(0, 126, 133, 0.2);
      }
      .step-content {
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
      }
      .step-hidden {
        display: none;
      }

      .btn-primary {
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px -5px rgba(0, 126, 133, 0.3);
      }

      /* ══════════════════════════════════════════════════
         SUCCESS / ERROR MODAL  — centered overlay
      ══════════════════════════════════════════════════ */
      #feedbackModal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(6px);
        z-index: 2000;
        justify-content: center;
        align-items: center;
      }
      #feedbackModal.show {
        display: flex;
      }

      .feedback-modal-box {
        background: white;
        border-radius: 28px;
        max-width: 420px;
        width: 90%;
        padding: 40px 36px;
        text-align: center;
        animation: modalFadeIn 0.35s ease-out;
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
      }
      .feedback-icon-ring {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
    </style>
  </head>

  <body class="overflow-hidden h-screen tracking-[1.1px]">
    <!-- BACK BUTTON -->
    <div class="back-button" onclick="goToLandingPage()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        />
      </svg>
    </div>

    <!-- ══════════════════════════════════════════
         CENTERED FEEDBACK MODAL (success + error)
    ══════════════════════════════════════════ -->
    <div id="feedbackModal">
      <div class="feedback-modal-box">
        <div id="feedbackIconRing" class="feedback-icon-ring"></div>
        <h2
          id="feedbackTitle"
          class="text-2xl font-extrabold text-slate-800 mb-3"
        ></h2>
        <p
          id="feedbackMessage"
          class="text-slate-500 text-sm leading-relaxed mb-8"
        ></p>
        <button
          id="feedbackBtn"
          onclick="handleFeedbackClose()"
          class="w-full bg-[#007E85] text-white font-bold py-3.5 rounded-xl text-base hover:bg-[#00666c] transition-all hover:-translate-y-0.5 active:scale-[0.98]"
        ></button>
      </div>
    </div>

    <!-- Profession Selection Modal -->
    <div id="professionModal" class="profession-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="text-xl font-bold text-[#007E85]">
            Select Specialization
          </h2>
          <button
            onclick="closeProfessionModal()"
            class="text-gray-400 hover:text-gray-600 transition"
          >
            <svg
              class="w-6 h-6"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="grid grid-cols-2 gap-3" id="professionOptionsList"></div>
        </div>
        <div class="modal-footer">
          <button
            onclick="closeProfessionModal()"
            class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 transition"
          >
            Cancel
          </button>
          <button
            onclick="confirmProfessionSelection()"
            class="px-4 py-2 bg-[#007E85] text-white rounded-lg hover:bg-[#00666c] transition"
          >
            Confirm
          </button>
        </div>
      </div>
    </div>

    <div class="flex h-screen w-full relative animate-fade-in">
      <!-- ── Left Panel ── -->
      <div
        class="w-full lg:w-[45%] flex flex-col justify-center px-8 sm:px-10 xl:px-20 2xl:px-24 z-20 relative bg-[#F8FAFB] h-screen"
      >
        <div class="max-w-md w-full mx-auto lg:mx-0 py-4">
          <!-- Logo -->
          <div class="mb-8 flex flex-col items-start">
            <div class="flex items-center gap-3 mb-4">
              <img
                src="../../src/assets/logo.svg"
                alt="Healthcare Logo"
                class="h-12 w-12"
                onerror="this.style.display = 'none'"
              />
              <span class="text-2xl font-extrabold">
                <span class="text-[#007E85]">Health</span
                ><span class="text-[#6EAB36]">care</span>
              </span>
            </div>
            <p
              class="text-slate-500 font-medium text-[12px] xl:text-base mt-[-10px]"
            >
              <span>Create Account </span>
              <span>to join our community for world-class digital care.</span>
            </p>
          </div>

          <!-- Step Indicators -->
          <div class="step-indicator mb-6">
            <span class="step-badge active" id="step1Badge">1. Identity</span>
            <span class="step-badge" id="step2Badge"
              >2. Contact &amp; Security</span
            >
          </div>

          <form id="signupForm" novalidate>
            <!-- ── STEP 1 ── -->
            <div id="step1" class="step-content space-y-4 xl:space-y-5">
              <div class="group">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >
                  Full Name
                </label>
                <input
                  id="signupFullName"
                  type="text"
                  class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                  placeholder=" "
                  oninput="clearErr('signupFullName')"
                />
                <p
                  id="signupFullName_err"
                  class="hidden text-red-600 text-xs font-semibold mt-1"
                ></p>
              </div>

              <div class="group">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >
                  Email Address
                </label>
                <input
                  id="signupEmail"
                  type="email"
                  class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                  placeholder=" "
                  oninput="clearErr('signupEmail')"
                />
                <p
                  id="signupEmail_err"
                  class="hidden text-red-600 text-xs font-semibold mt-1"
                ></p>
              </div>

              <div class="relative group">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >
                  Register as
                </label>
                <button
                  type="button"
                  id="customSelectBtn"
                  class="custom-input w-full flex justify-between items-center py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                >
                  <span id="selectedValue">Patient</span>
                  <div
                    class="bg-slate-100 p-1 rounded-full group-hover:bg-[#007E85]/10 transition-colors"
                  >
                    <svg
                      id="chevron"
                      class="w-4 h-4 text-[#007E85] transition-transform duration-300"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="3"
                        d="M19 9l-7 7-7-7"
                      />
                    </svg>
                  </div>
                </button>
                <div
                  id="dropdownMenu"
                  class="hidden absolute left-0 w-full mt-2 glass-card rounded-xl overflow-hidden z-50 opacity-0 -translate-y-2 transition-all duration-200"
                >
                  <div class="p-1.5 space-y-1">
                    <div
                      class="option-item flex items-center px-4 py-2.5 hover:bg-[#007E85] hover:text-white rounded-lg cursor-pointer transition-all"
                      data-value="patient"
                    >
                      <span class="font-bold text-sm">Patient</span>
                    </div>
                    <div
                      class="option-item flex items-center px-4 py-2.5 hover:bg-[#007E85] hover:text-white rounded-lg cursor-pointer transition-all"
                      data-value="doctor"
                    >
                      <span class="font-bold text-sm"
                        >Medical Professional</span
                      >
                    </div>
                  </div>
                </div>
              </div>

              <!-- Doctor-only fields -->
              <div id="doctorFieldsContainer">
                <div class="group mb-4">
                  <label
                    class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                  >
                    Medical ID <span class="text-red-500">*</span>
                  </label>
                  <input
                    id="signupMedicalId"
                    type="text"
                    class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                    placeholder="Enter your medical registration ID"
                    oninput="clearErr('signupMedicalId')"
                  />
                  <p
                    id="signupMedicalId_err"
                    class="hidden text-red-600 text-xs font-semibold mt-1"
                  ></p>
                </div>

                <div class="group">
                  <label
                    class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                  >
                    Profession / Specialization
                    <span class="text-red-500">*</span>
                  </label>
                  <div
                    id="professionDisplay"
                    class="selected-profession-display"
                    onclick="openProfessionModal()"
                  >
                    <span id="selectedProfessionText" class="text-gray-500"
                      >Click to select specialization</span
                    >
                    <svg
                      class="w-5 h-5 text-[#007E85]"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 9l-7 7-7-7"
                      />
                    </svg>
                  </div>
                  <input type="hidden" id="selectedProfessionValue" value="" />
                  <p
                    id="signupProfession_err"
                    class="hidden text-red-600 text-xs font-semibold mt-1"
                  ></p>
                </div>

                <div class="group mt-4">
                  <label
                    class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                  >
                    Professional Bio <span class="text-red-500">*</span>
                  </label>
                  <textarea
                    id="signupBio"
                    rows="3"
                    class="w-full p-3 rounded-xl border-2 border-slate-100 bg-slate-50 focus:border-[#007E85] focus:bg-white outline-none text-slate-800 text-sm transition-all resize-none shadow-inner"
                    placeholder="Describe your experience, qualifications, and specialties (minimum 15 words)..."
                    oninput="
                      updateBioWordCount();
                      clearErr('signupBio');
                    "
                  ></textarea>
                  <p
                    id="signupBio_err"
                    class="hidden text-red-600 text-xs font-semibold mt-1"
                  ></p>
                  <p class="text-xs text-gray-400 mt-1" id="bioWordCount">
                    0 words (minimum 15 required)
                  </p>
                </div>
              </div>

              <div class="pt-4">
                <button
                  type="button"
                  id="nextStepBtn"
                  class="btn-primary w-full bg-[#007E85] text-white font-bold py-4 xl:py-5 rounded-xl text-base xl:text-lg shadow-lg hover:bg-[#00666c] transition-all hover:-translate-y-0.5 active:scale-[0.98]"
                >
                  Continue →
                </button>
              </div>
            </div>
            <!-- /step1 -->

            <!-- ── STEP 2 ── -->
            <div
              id="step2"
              class="step-content step-hidden space-y-4 xl:space-y-5"
            >
              <div class="group">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >
                  Phone Number
                </label>
                <input
                  id="signupPhone"
                  type="tel"
                  class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                  placeholder=" "
                  oninput="clearErr('signupPhone')"
                />
                <p
                  id="signupPhone_err"
                  class="hidden text-red-600 text-xs font-semibold mt-1"
                ></p>
              </div>

              <div class="group">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >
                  Age
                </label>
                <input
                  id="signupAge"
                  type="number"
                  class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none"
                  placeholder=" "
                  oninput="clearErr('signupAge')"
                />
                <p
                  id="signupAge_err"
                  class="hidden text-red-600 text-xs font-semibold mt-1"
                ></p>
              </div>

              <div class="group">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >
                  Create Password
                </label>
                <div class="relative">
                  <input
                    id="signupPassword"
                    type="password"
                    class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none pr-10"
                    oninput="
                      updateStrength();
                      clearErr('signupPassword');
                    "
                  />
                  <button
                    type="button"
                    onclick="togglePass()"
                    class="absolute right-0 bottom-2 text-[#007E85] hover:text-[#005f65]"
                    tabindex="-1"
                  >
                    <svg
                      id="eyeIcon"
                      xmlns="http://www.w3.org/2000/svg"
                      class="w-5 h-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                      />
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                               -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                      />
                    </svg>
                  </button>
                </div>
                <div
                  class="mt-2 h-1.5 w-full bg-slate-100 rounded-full overflow-hidden"
                >
                  <div
                    id="strengthBar"
                    class="h-full rounded-full transition-all duration-500 w-0"
                  ></div>
                </div>
                <p
                  id="strengthLabel"
                  class="text-xs mt-1 font-semibold text-slate-400"
                ></p>
                <p
                  id="signupPassword_err"
                  class="hidden text-red-600 text-xs font-semibold mt-1"
                ></p>
              </div>

              <div class="group">
                <label
                  class="text-[#007E85] text-[10px] font-bold uppercase tracking-widest mb-1 block"
                >
                  Confirm Password
                </label>
                <div class="relative">
                  <input
                    id="signupConfirmPassword"
                    type="password"
                    class="custom-input w-full bg-transparent py-1.5 text-base xl:text-lg text-slate-800 outline-none pr-10"
                    oninput="clearErr('signupConfirmPassword')"
                  />
                  <button
                    type="button"
                    onclick="toggleConfirmPass()"
                    class="absolute right-0 bottom-2 text-[#007E85] hover:text-[#005f65]"
                    tabindex="-1"
                  >
                    <svg
                      id="confirmEyeIcon"
                      xmlns="http://www.w3.org/2000/svg"
                      class="w-5 h-5"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                      />
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                               -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                      />
                    </svg>
                  </button>
                </div>
                <p
                  id="signupConfirmPassword_err"
                  class="hidden text-red-600 text-xs font-semibold mt-1"
                ></p>
              </div>

              <div class="flex gap-3 pt-4">
                <button
                  type="button"
                  id="prevStepBtn"
                  class="w-1/3 bg-white border-2 border-[#007E85] text-[#007E85] font-bold py-4 rounded-xl text-base hover:bg-gray-50 transition-all hover:-translate-y-0.5 active:scale-[0.98]"
                >
                  ← Back
                </button>
                <button
                  type="submit"
                  id="submitBtn"
                  class="btn-primary w-2/3 bg-[#007E85] text-white font-bold py-4 rounded-xl text-base xl:text-lg shadow-lg hover:bg-[#00666c] transition-all hover:-translate-y-0.5 active:scale-[0.98]"
                >
                  Register Now
                </button>
              </div>

              <p class="text-center pt-2 text-slate-500 text-sm font-medium">
                Already have an account?
                <a
                  href="login.html"
                  class="text-[#007E85] font-bold hover:underline"
                  >sign in</a
                >
              </p>
            </div>
            <!-- /step2 -->
          </form>
        </div>
      </div>

      <!-- ── Right Panel ── -->
      <div
        class="hidden lg:block w-[55%] relative overflow-hidden bg-[#F8FAFB]"
      >
        <div class="absolute inset-0 organic-bg z-0 shadow-2xl"></div>
        <div
          class="relative h-full w-full flex items-center justify-center z-10 p-12"
        >
          <img
            src="../../src/assets/photo.png"
            alt="Healthcare Professional"
            class="h-[300%] object-contain transform scale-110 mt-10"
            onerror="this.style.display = 'none'"
          />
        </div>
      </div>
    </div>
    <!-- /flex wrapper -->

    <script>
      // ═══════════════════════════════════════════════════════════════
      //  CENTERED FEEDBACK MODAL
      //  — used for SUCCESS (patient & doctor) and ERROR messages
      //  — no inline error divs anywhere in this file
      // ═══════════════════════════════════════════════════════════════
      let _redirectOnClose = false; // true only for patient success

      function _openFeedbackModal(
        iconHtml,
        iconBg,
        title,
        message,
        btnLabel,
        redirect,
      ) {
        _redirectOnClose = !!redirect;

        const ring = document.getElementById("feedbackIconRing");
        ring.style.background = iconBg;
        ring.innerHTML = iconHtml;

        document.getElementById("feedbackTitle").textContent = title;
        document.getElementById("feedbackMessage").innerHTML = message;
        document.getElementById("feedbackBtn").textContent = btnLabel;

        document.getElementById("feedbackModal").classList.add("show");
        document.body.style.overflow = "hidden";
      }

      function handleFeedbackClose() {
        document.getElementById("feedbackModal").classList.remove("show");
        document.body.style.overflow = "";
        if (_redirectOnClose) {
          window.location.href = "login.html"; // ← patient redirect
        }
      }

      // ── Patient success ─────────────────────────────────────────────
      function showPatientSuccess(fullName) {
        _openFeedbackModal(
          `<svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-green-500"
              fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
           <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
         </svg>`,
          "linear-gradient(135deg,#d1fae5,#a7f3d0)",
          "Welcome to Healthcare!",
          `Thank you for registering, <strong>${fullName}</strong>! 🎉<br><br>
         Your account has been created successfully. You can now
         <strong>sign in</strong> and start booking appointments with our
         world-class medical professionals.`,
          "Go to Login →",
          true, // ← redirect = true
        );
      }

      // ── Doctor success ──────────────────────────────────────────────
      function showDoctorSuccess(fullName) {
        _openFeedbackModal(
          `<svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-teal-500"
              fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
           <path stroke-linecap="round" stroke-linejoin="round"
                 d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944
                    a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9
                    c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03
                    9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
         </svg>`,
          "linear-gradient(135deg,#ccfbf1,#99f6e4)",
          "Application Submitted!",
          `Thank you, <strong>${fullName}</strong>! 🎉<br><br>
         Your registration as a <strong>Medical Professional</strong> has been received.
         Our admin team will review your credentials and
         <strong>contact you once you are approved</strong>.<br><br>
         You'll receive an email notification with further instructions.`,
          "Got it, I'll wait!",
          false, // ← no redirect
        );
      }

      // ── Error (any failure) ─────────────────────────────────────────
      function showErrorModal(msg) {
        _openFeedbackModal(
          `<svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-red-500"
              fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
           <path stroke-linecap="round" stroke-linejoin="round"
                 d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94
                    a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
         </svg>`,
          "linear-gradient(135deg,#fee2e2,#fecaca)",
          "Registration Failed",
          msg,
          "Try Again",
          false,
        );
      }

      // ═══════════════════════════════════════════════════════════════
      //  TWO-STEP NAVIGATION
      // ═══════════════════════════════════════════════════════════════
      const step1 = document.getElementById("step1");
      const step2 = document.getElementById("step2");
      const step1Badge = document.getElementById("step1Badge");
      const step2Badge = document.getElementById("step2Badge");
      const nextBtn = document.getElementById("nextStepBtn");
      const prevBtn = document.getElementById("prevStepBtn");

      function showStep(n) {
        if (n === 1) {
          step1.style.animation = "stepFadeIn 0.3s ease-out";
          step1.classList.remove("step-hidden");
          step2.classList.add("step-hidden");
          step1Badge.classList.add("active");
          step2Badge.classList.remove("active");
        } else {
          step2.style.animation = "stepFadeIn 0.3s ease-out";
          step2.classList.remove("step-hidden");
          step1.classList.add("step-hidden");
          step2Badge.classList.add("active");
          step1Badge.classList.remove("active");
        }
      }

      function validateStep1() {
        let ok = true;
        const fullName = document.getElementById("signupFullName").value.trim();
        if (!fullName) {
          showErr("signupFullName", "Full name is required.");
          ok = false;
        } else if (fullName.length < 2) {
          showErr("signupFullName", "Name must be at least 2 characters.");
          ok = false;
        } else if (!/^[a-zA-Z\s\-']+$/.test(fullName)) {
          showErr("signupFullName", "Name must contain letters only.");
          ok = false;
        } else clearErr("signupFullName");

        const email = document.getElementById("signupEmail").value.trim();
        if (!email) {
          showErr("signupEmail", "Email address is required.");
          ok = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) {
          showErr("signupEmail", "Enter a valid email address.");
          ok = false;
        } else clearErr("signupEmail");

        if (selectedRole === "Medical Professional") {
          const mid = document.getElementById("signupMedicalId").value.trim();
          if (!mid) {
            showErr("signupMedicalId", "Medical ID is required.");
            ok = false;
          } else if (mid.length < 4) {
            showErr(
              "signupMedicalId",
              "Medical ID must be at least 4 characters.",
            );
            ok = false;
          } else clearErr("signupMedicalId");

          if (!finalSelectedProfession) {
            showErr(
              "signupProfession",
              "Please select your profession/specialization.",
            );
            ok = false;
          } else clearErr("signupProfession");

          const bio = document.getElementById("signupBio").value.trim();
          if (!bio) {
            showErr("signupBio", "Professional bio is required.");
            ok = false;
          } else if (bio.split(/\s+/).length < 15) {
            showErr("signupBio", "Bio must contain at least 15 words.");
            ok = false;
          } else clearErr("signupBio");
        }
        return ok;
      }

      nextBtn.addEventListener("click", () => {
        if (validateStep1()) showStep(2);
      });
      prevBtn.addEventListener("click", () => showStep(1));

      // ═══════════════════════════════════════════════════════════════
      //  PROFESSION MODAL
      // ═══════════════════════════════════════════════════════════════
      const professions = [
        { icon: "🦷", name: "Dentist" },
        { icon: "🏥", name: "General Physician" },
        { icon: "🧴", name: "Dermatologist" },
        { icon: "👶", name: "Pediatrician" },
        { icon: "🧠", name: "Neurologist" },
        { icon: "❤️", name: "Cardiologist" },
        { icon: "🦴", name: "Orthopedic" },
        { icon: "👁️", name: "Ophthalmologist" },
        { icon: "🧠", name: "Psychiatrist" },
        { icon: "📋", name: "Radiologist" },
        { icon: "💉", name: "Anesthesiologist" },
        { icon: "🔬", name: "Pathologist" },
        { icon: "👩‍⚕️", name: "Gynecologist" },
        { icon: "🏥", name: "Emergency Medicine" },
        { icon: "📌", name: "Other" },
      ];

      let tempSelectedProfession = "";
      let finalSelectedProfession = "";

      function populateProfessionModal() {
        const container = document.getElementById("professionOptionsList");
        container.innerHTML = "";
        professions.forEach((prof) => {
          const div = document.createElement("div");
          div.className = "profession-option-modal";
          div.setAttribute("data-profession", prof.name);
          div.innerHTML = `<span class="text-xl">${prof.icon}</span><span class="font-medium">${prof.name}</span>`;
          div.onclick = () => selectProfessionInModal(prof.name, div);
          container.appendChild(div);
        });
      }

      function selectProfessionInModal(profession, el) {
        document
          .querySelectorAll(".profession-option-modal")
          .forEach((e) => e.classList.remove("selected"));
        el.classList.add("selected");
        tempSelectedProfession = profession;
      }

      function openProfessionModal() {
        tempSelectedProfession = finalSelectedProfession;
        populateProfessionModal();
        if (tempSelectedProfession) {
          document
            .querySelectorAll(".profession-option-modal")
            .forEach((el) => {
              if (el.getAttribute("data-profession") === tempSelectedProfession)
                el.classList.add("selected");
            });
        }
        document.getElementById("professionModal").classList.add("show");
        document.body.style.overflow = "hidden";
      }

      function closeProfessionModal() {
        document.getElementById("professionModal").classList.remove("show");
        document.body.style.overflow = "";
      }

      function confirmProfessionSelection() {
        if (tempSelectedProfession) {
          finalSelectedProfession = tempSelectedProfession;
          document.getElementById("selectedProfessionText").innerHTML =
            `<span class="chip">${finalSelectedProfession}</span>`;
          document.getElementById("selectedProfessionValue").value =
            finalSelectedProfession;
          clearErr("signupProfession");
        }
        closeProfessionModal();
      }

      function goToLandingPage() {
        window.location.href = "../../index.html";
      }

      // ═══════════════════════════════════════════════════════════════
      //  ROLE DROPDOWN
      // ═══════════════════════════════════════════════════════════════
      const customSelectBtn = document.getElementById("customSelectBtn");
      const dropdownMenu = document.getElementById("dropdownMenu");
      const chevron = document.getElementById("chevron");
      const selectedValueDisplay = document.getElementById("selectedValue");
      const doctorFieldsContainer = document.getElementById(
        "doctorFieldsContainer",
      );
      let selectedRole = "Patient";

      customSelectBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (dropdownMenu.classList.contains("hidden")) {
          dropdownMenu.classList.remove("hidden");
          setTimeout(() => {
            dropdownMenu.classList.remove("opacity-0", "-translate-y-2");
            dropdownMenu.classList.add("opacity-100", "translate-y-0");
          }, 10);
          chevron.classList.add("rotate-180");
        } else {
          closeRoleDropdown();
        }
      });

      function closeRoleDropdown() {
        dropdownMenu.classList.add("opacity-0", "-translate-y-2");
        dropdownMenu.classList.remove("opacity-100", "translate-y-0");
        chevron.classList.remove("rotate-180");
        setTimeout(() => dropdownMenu.classList.add("hidden"), 300);
      }

      document.querySelectorAll(".option-item").forEach((option) => {
        option.addEventListener("click", () => {
          const val = option.getAttribute("data-value");
          selectedValueDisplay.innerText = option.innerText.trim();
          selectedRole = option.innerText.trim();
          if (val === "doctor") {
            doctorFieldsContainer.classList.add("show");
          } else {
            doctorFieldsContainer.classList.remove("show");
            finalSelectedProfession = "";
            document.getElementById("selectedProfessionText").innerHTML =
              "Click to select specialization";
            document.getElementById("selectedProfessionValue").value = "";
          }
          closeRoleDropdown();
        });
      });

      window.onclick = (e) => {
        if (customSelectBtn && !customSelectBtn.contains(e.target))
          closeRoleDropdown();
      };

      // ═══════════════════════════════════════════════════════════════
      //  HELPERS
      // ═══════════════════════════════════════════════════════════════
      function updateBioWordCount() {
        const text = document.getElementById("signupBio").value.trim();
        const wordCount = text === "" ? 0 : text.split(/\s+/).length;
        const span = document.getElementById("bioWordCount");
        span.textContent = `${wordCount} words (minimum 15 required)`;
        span.classList.toggle("text-green-600", wordCount >= 15);
        span.classList.toggle("text-red-500", wordCount < 15);
      }

      function togglePass() {
        const input = document.getElementById("signupPassword");
        const icon = document.getElementById("eyeIcon");
        input.type = input.type === "password" ? "text" : "password";
        icon.style.opacity = input.type === "text" ? "0.45" : "1";
      }

      function toggleConfirmPass() {
        const input = document.getElementById("signupConfirmPassword");
        const icon = document.getElementById("confirmEyeIcon");
        input.type = input.type === "password" ? "text" : "password";
        icon.style.opacity = input.type === "text" ? "0.45" : "1";
      }

      function updateStrength() {
        const v = document.getElementById("signupPassword").value;
        const bar = document.getElementById("strengthBar");
        const lbl = document.getElementById("strengthLabel");
        let score = 0;
        if (v.length >= 8) score++;
        if (/[A-Z]/.test(v)) score++;
        if (/[0-9]/.test(v)) score++;
        if (/[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>\/?]/.test(v)) score++;
        const levels = [
          { w: "0%", bg: "", label: "" },
          { w: "25%", bg: "bg-red-500", label: "Weak" },
          { w: "50%", bg: "bg-orange-400", label: "Fair" },
          { w: "75%", bg: "bg-yellow-400", label: "Good" },
          { w: "100%", bg: "bg-green-500", label: "Strong" },
        ];
        bar.className =
          "h-full rounded-full transition-all duration-500 " + levels[score].bg;
        bar.style.width = levels[score].w;
        const colors = [
          "text-slate-400",
          "text-red-500",
          "text-orange-400",
          "text-yellow-500",
          "text-green-600",
        ];
        lbl.className = `text-xs mt-1 font-semibold ${colors[score]}`;
        lbl.textContent = levels[score].label;
      }

      function showErr(id, msg) {
        const input = document.getElementById(id);
        const err = document.getElementById(id + "_err");
        if (input) input.classList.add("input-error");
        if (err) {
          err.textContent = msg;
          err.classList.remove("hidden");
        }
      }

      function clearErr(id) {
        const input = document.getElementById(id);
        const err = document.getElementById(id + "_err");
        if (input) input.classList.remove("input-error");
        if (err) {
          err.textContent = "";
          err.classList.add("hidden");
        }
      }

      const Validators = {
        phone(v) {
          const d = v.replace(/[\s\-()\+]/g, "");
          if (!v) return "Phone number is required.";
          if (!/^\d{10}$/.test(d))
            return "Phone number must be exactly 10 digits.";
          return null;
        },
        age(v) {
          if (!v) return "Age is required.";
          if (!/^\d+$/.test(v)) return "Age must be a whole number.";
          const n = parseInt(v, 10);
          if (n < 18) return "You must be at least 18 years old.";
          if (n > 120) return "Please enter a valid age.";
          return null;
        },
        password(v) {
          if (!v) return "Password is required.";
          if (v.length < 8) return "Password must be at least 8 characters.";
          if (!/[A-Z]/.test(v))
            return "Password must include an uppercase letter.";
          if (!/[0-9]/.test(v)) return "Password must include a number.";
          if (!/[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>\/?]/.test(v))
            return "Password must include a special character.";
          return null;
        },
      };

      // ═══════════════════════════════════════════════════════════════
      //  FORM SUBMIT
      // ═══════════════════════════════════════════════════════════════
      document
        .getElementById("signupForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const phone = document.getElementById("signupPhone").value.trim();
          const age = document.getElementById("signupAge").value.trim();
          const password = document.getElementById("signupPassword").value;
          const confirmPassword = document.getElementById(
            "signupConfirmPassword",
          ).value;
          const fullName = document
            .getElementById("signupFullName")
            .value.trim();
          const email = document.getElementById("signupEmail").value.trim();
          const medicalId = document
            .getElementById("signupMedicalId")
            .value.trim();
          const bio = document.getElementById("signupBio").value.trim();
          const isDoctor = selectedRole === "Medical Professional";

          [
            "signupPhone",
            "signupAge",
            "signupPassword",
            "signupConfirmPassword",
          ].forEach(clearErr);
          let hasError = false;

          const phoneErr = Validators.phone(phone);
          if (phoneErr) {
            showErr("signupPhone", phoneErr);
            hasError = true;
          }

          const ageErr = Validators.age(age);
          if (ageErr) {
            showErr("signupAge", ageErr);
            hasError = true;
          }

          const passErr = Validators.password(password);
          if (passErr) {
            showErr("signupPassword", passErr);
            hasError = true;
          }

          if (!confirmPassword) {
            showErr("signupConfirmPassword", "Please confirm your password.");
            hasError = true;
          } else if (password !== confirmPassword) {
            showErr("signupConfirmPassword", "Passwords do not match.");
            hasError = true;
          }

          if (hasError) return;

          // Loading state
          const btn = document.getElementById("submitBtn");
          const origText = btn.innerText;
          btn.innerHTML = `<svg class="animate-spin inline w-5 h-5 mr-2" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
      </svg> Registering...`;
          btn.disabled = true;

          const formData = new FormData();
          formData.append("full_name", fullName);
          formData.append("email", email);
          formData.append("phone", phone);
          formData.append("age", age);
          formData.append("role", selectedRole);
          formData.append("password", password);
          if (isDoctor) {
            formData.append("medical_id", medicalId);
            formData.append("bio", bio);
            formData.append("profession", finalSelectedProfession);
            formData.append("specialization", finalSelectedProfession);
          }

          try {
            const response = await fetch("../../api/auth/signup_process.php", {
              method: "POST",
              body: formData,
            });

            const text = await response.text();
            let data;
            try {
              data = JSON.parse(text);
            } catch {
              console.error("Non-JSON response:", text);
              // ✅ Centered error modal — no inline div
              showErrorModal("Server error. Please try again.");
              return;
            }

            if (data.success) {
              // ✅ Correct modal per role
              if (isDoctor) {
                showDoctorSuccess(fullName);
              } else {
                showPatientSuccess(fullName); // closes → redirects to login.html
              }
            } else {
              const errMsg =
                data.message || "Registration failed. Please try again.";
              if (errMsg.toLowerCase().includes("email")) {
                // Go back to step 1 and highlight the email field inline
                showStep(1);
                showErr("signupEmail", errMsg);
              } else {
                // ✅ All other errors → centered modal
                showErrorModal(errMsg);
              }
            }
          } catch (err) {
            console.error("Fetch error:", err);
            // ✅ Network errors → centered modal
            showErrorModal(
              "Network error. Please check your connection and try again.",
            );
          } finally {
            btn.innerHTML = origText;
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
