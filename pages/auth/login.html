<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healthcare Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Lato", sans-serif;
      }

      .organic-bg {
        background-color: #007e85;
        clip-path: path(
          "M1000 0 L1000 1000 L300 1000 C150 1000 150 800 250 700 C400 550 50 600 50 350 C50 150 400 150 450 0 Z"
        );
        height: 100%;
        width: 100%;
      }

      .shape-wrapper {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      @media (max-width: 1280px) {
        .organic-bg {
          clip-path: polygon(
            100% 0%,
            100% 100%,
            35% 100%,
            15% 70%,
            35% 55%,
            10% 35%,
            40% 0%
          );
        }
      }

      @keyframes fadeIn {
        0% {
          opacity: 0;
        }
        100% {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideRight {
        0% {
          opacity: 0;
          transform: translateX(-30px);
        }
        100% {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .animate-fade-in {
        animation: fadeIn 0.6s ease-out forwards;
      }
      .animate-slide-up {
        animation: slideUp 0.7s ease-out forwards;
      }
      .animate-slide-right {
        animation: slideRight 0.8s ease-out forwards;
      }

      /* Modal */
      #forgotModal {
        display: none;
      }
      #forgotModal.show {
        display: flex;
      }

      /* Back Button Style - Arrow Only */
      .back-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
        background: rgba(0, 126, 133, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 50px;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 1px solid rgba(0, 126, 133, 0.2);
      }
      .back-button:hover {
        background: rgba(0, 126, 133, 0.2);
        transform: translateX(-3px);
      }
      .back-button svg {
        width: 22px;
        height: 22px;
        color: #007e85;
      }
    </style>
  </head>
  <body class="bg-[#F2F2F2] m-0 p-0 overflow-hidden h-screen tracking-[1.1px]">
    <!-- BACK BUTTON - Arrow Only -->
    <div class="back-button" onclick="goToLandingPage()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M10 19l-7-7m0 0l7-7m-7 7h18"
        />
      </svg>
    </div>

    <!-- Forgot Password Modal -->
    <div
      id="forgotModal"
      class="fixed inset-0 z-50 items-center justify-center bg-black/40 backdrop-blur-sm"
    >
      <div
        class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center"
      >
        <div class="flex justify-center mb-4">
          <div class="bg-[#007E85]/10 rounded-full p-4">
            <svg
              class="w-10 h-10 text-[#007E85]"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
              />
            </svg>
          </div>
        </div>
        <h2 class="text-[#007E85] font-black text-2xl mb-3">
          Forgot Password?
        </h2>
        <p class="text-gray-600 text-sm mb-4 leading-relaxed">
          Please contact admin through email requesting for password change.
        </p>
        <a
          href="mailto:admin@healthcare.com"
          class="inline-block bg-[#007E85]/10 text-[#007E85] font-bold text-base px-4 py-2 rounded-xl hover:bg-[#007E85]/20 transition mb-6"
        >
          admin@healthcare.com
        </a>
        <button
          onclick="
            document.getElementById('forgotModal').classList.remove('show')
          "
          class="w-full bg-[#007E85] hover:bg-[#00666c] text-white font-black py-3 rounded-xl text-lg shadow transition-all active:scale-[0.98]"
        >
          Back to Login
        </button>
      </div>
    </div>

    <div
      class="flex h-screen w-full relative"
      data-scroll-animation="animate-fade-in"
      data-delay="0s"
    >
      <div
        class="w-full lg:w-[45%] flex flex-col justify-center lg:justify-between items-center lg:items-start py-12 px-6 sm:px-12 lg:pl-24 xl:pl-32 z-10 gap-10 lg:gap-0"
      >
        <div
          class="flex flex-col items-center"
          data-scroll-animation="animate-slide-up"
          data-delay="0.1s"
        >
          <img
            src="../../src/assets/Logo.svg"
            alt="Healthcare Logo"
            class="h-20 w-20 mb-2"
          />
          <h1
            class="text-[#007E85] font-black text-7xl tracking-[1.1px] leading-none not-italic"
          >
            WELCOME
          </h1>
          <div
            class="w-full border-t border-dotted border-[#007E85] mt-2 opacity-40"
          ></div>
        </div>

        <div
          class="w-full max-w-sm px-4 lg:px-0"
          data-scroll-animation="animate-slide-up"
          data-delay="0.2s"
        >
          <div class="mb-10">
            <label class="text-[#007E85] font-bold text-xl block mb-2"
              >Email</label
            >
            <input
              id="loginEmail"
              type="email"
              class="w-full border-b-2 border-[#007E85] bg-transparent focus:outline-none pb-2 text-gray-800 text-lg"
            />
          </div>

          <div class="mb-4">
            <label class="text-[#007E85] font-bold text-xl block mb-2"
              >Password</label
            >
            <div class="relative">
              <input
                id="loginPassword"
                type="password"
                class="w-full border-b-2 border-[#007E85] bg-transparent focus:outline-none pb-2 text-gray-800 text-lg pr-10"
              />
              <button
                type="button"
                onclick="togglePass()"
                class="absolute right-0 bottom-2 text-[#007E85] hover:text-[#005f65]"
                tabindex="-1"
              >
                <svg
                  id="eyeIcon"
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-6 h-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="w-full mb-10">
            <p class="text-gray-700 text-sm">
              Don't have an account?
              <a
                href="signup.html"
                class="text-[#007E85] font-bold hover:underline"
                >Sign up</a
              >
            </p>
            <button
              onclick="
                document.getElementById('forgotModal').classList.add('show')
              "
              class="text-[#007E85] text-sm font-bold hover:underline mt-1"
            >
              Forgot Password?
            </button>
          </div>

          <p
            id="loginError"
            class="hidden text-red-600 text-sm font-semibold mb-4 text-center"
          ></p>

          <button
            onclick="handleLogin()"
            class="w-full bg-[#007E85] hover:bg-[#00666c] text-white font-black py-4 rounded-xl text-2xl shadow-lg transition-all active:scale-[0.98]"
          >
            LOGIN
          </button>
        </div>

        <div
          class="flex items-center gap-3 mt-[20px]"
          data-scroll-animation="animate-slide-up"
          data-delay="0.3s"
        >
          <img
            src="../../src/assets/Logo.svg"
            alt="Healthcare Logo"
            class="h-10 w-10"
          />
          <span class="text-3xl font-black not-italic">
            <span class="text-[#007E85]">Health</span
            ><span class="text-[#6EAB36]">care</span>
          </span>
        </div>
      </div>

      <div class="hidden lg:block w-[55%] relative">
        <div class="shape-wrapper">
          <div class="organic-bg"></div>
        </div>
        <div
          class="relative h-full w-full flex items-center justify-center z-10"
          data-scroll-animation="animate-slide-right"
          data-delay="0.2s"
        >
          <img
            src="../../src/assets/doctor.png"
            alt="Healthcare Professional"
            class="h-[85%] object-contain mt-16 ml-10 transform scale-110"
          />
        </div>
      </div>
    </div>

    <script>
      // Go to Landing Page (Homepage)
      function goToLandingPage() {
        window.location.href = "../../index.html";
      }

      function handleLogin() {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value.trim();
        const errorEl = document.getElementById("loginError");

        errorEl.classList.add("hidden");
        errorEl.textContent = "";

        if (!email || !password) {
          errorEl.textContent = "Please fill in all fields.";
          errorEl.classList.remove("hidden");
          return;
        }

        const formData = new FormData();
        formData.append("email", email);
        formData.append("password", password);

        fetch("../../api/auth/login_process.php", {
          method: "POST",
          body: formData,
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.status === "success") {
              window.location.href = data.redirect;
            } else {
              errorEl.textContent =
                data.message || "Email or password didn't match.";
              errorEl.classList.remove("hidden");
            }
          })
          .catch((error) => {
            console.error("Error:", error);
            errorEl.textContent = "An error occurred during login.";
            errorEl.classList.remove("hidden");
          });
      }

      function togglePass() {
        const input = document.getElementById("loginPassword");
        const icon = document.getElementById("eyeIcon");
        const show = input.type === "password";
        input.type = show ? "text" : "password";
        icon.style.opacity = show ? "0.45" : "1";
      }

      // Allow Enter key to trigger login
      document.addEventListener("keypress", function (event) {
        if (event.key === "Enter") {
          const email = document.getElementById("loginEmail");
          const password = document.getElementById("loginPassword");
          if (
            document.activeElement === email ||
            document.activeElement === password
          ) {
            handleLogin();
          }
        }
      });
    </script>
    <script src="../../src/js/scroll-animations.js"></script>
  </body>
</html>
