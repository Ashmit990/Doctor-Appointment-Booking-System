<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Appointment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="booking.css" />
  </head>
  <body class="bg-white font-sans">
    <div class="p-5 md:p-6">
      <div class="mb-4">
        <p class="text-sm text-slate-400 mb-2">Quick Booking Access</p>
        <h2 class="text-2xl md:text-3xl font-bold text-slate-800">
          Book Appointment
        </h2>
        <p class="text-slate-500 mt-2">
          Fill in the details below to schedule a new appointment.
        </p>
      </div>

      <form id="bookingForm" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
              Patient Name
            </label>
            <input
              id="patientName"
              type="text"
              placeholder="Enter patient name"
              class="w-full border border-slate-200 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-teal-300"
              required
            />
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
              Doctor
            </label>
            <select
              id="doctor"
              class="w-full border border-slate-200 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-teal-300"
              required
            >
              <option value="">Loading doctors…</option>
            </select>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
              Date
            </label>
            <select
              id="date"
              class="w-full border border-slate-200 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-teal-300"
              required
            >
              <option value="">Select doctor first</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-2">
              Time
            </label>
            <select
              id="time"
              class="w-full border border-slate-200 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-teal-300"
              required
            >
              <option value="">Select date first</option>
            </select>
          </div>
        </div>

        <input type="hidden" id="availId" value="" />

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">
            Short Description
          </label>
          <textarea
            id="description"
            rows="3"
            placeholder="Enter short description (e.g. follow-up, fever, headache, checkup)"
            class="w-full border border-slate-200 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-teal-300 resize-none"
          ></textarea>
        </div>

        <div
          class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 pt-2 border-t border-slate-100 mt-2"
        >
          <p class="text-slate-700">
            <span class="text-sm text-slate-500">Total</span>
            <span id="totalPrice" class="text-xl font-bold text-teal-700 ml-2"
              >—</span
            >
          </p>
          <div class="flex gap-3">
          <button
            type="submit"
            id="confirmBtn"
            class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-3 rounded-2xl font-medium transition"
          >
            Confirm Booking
          </button>

          <button
            type="button"
            id="cancelBooking"
            class="border border-slate-200 hover:bg-slate-50 text-slate-700 px-6 py-3 rounded-2xl font-medium transition"
          >
            Cancel
          </button>
          </div>
        </div>
      </form>

      <div
        id="bookingSuccess"
        class="hidden mt-4 rounded-2xl bg-emerald-50 border border-emerald-200 px-4 py-3 text-emerald-700"
      >
        Appointment booked successfully.
      </div>
    </div>

    <script src="patient-common.js"></script>
    <script src="booking.js"></script>
  </body>
</html>
