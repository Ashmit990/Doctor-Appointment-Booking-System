<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Dashboard - View Appointments</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="dashboard.css" />
</head>

<body class="bg-slate-100 min-h-screen font-sans">
  <div class="flex flex-col md:flex-row min-h-screen relative">
    <aside
      class="w-full md:w-60 bg-[#007E85] text-white flex flex-row md:flex-col items-center justify-around md:justify-start py-2 md:py-0 px-2 md:px-0 shadow-[0_-4px_10px_rgba(0,0,0,0.1)] md:shadow-xl fixed bottom-0 md:sticky md:top-0 left-0 h-auto md:h-screen z-[100] overflow-x-auto md:overflow-y-auto">
      
      <div class="hidden md:flex w-full px-6 py-7 items-center gap-3 border-b border-white/10 shrink-0 mb-2">
        <img src="../../src/assets/Logo.svg" alt="Logo" class="w-8 h-8">
        <span class="text-white font-bold text-lg">Healthcare</span>
      </div>

      <nav class="flex flex-row md:flex-col justify-around md:justify-start w-full md:flex-1 md:px-3 md:gap-1 md:pb-3">
        <button onclick="goToHomePage()"
          class="flex flex-col md:flex-row items-center md:gap-3 px-3 md:px-4 py-2 md:py-3 rounded-xl text-white/75 hover:bg-white/10 hover:text-white text-[10px] md:text-sm font-medium transition-all w-auto md:w-full md:text-left"
          title="Home">
          <i data-lucide="house" class="w-6 h-6 md:w-5 md:h-5 shrink-0"></i>
          <span class="mt-1 md:mt-0 font-medium whitespace-nowrap">Home</span>
        </button>

        <button
          class="flex flex-col md:flex-row items-center md:gap-3 px-3 md:px-4 py-2 md:py-3 rounded-xl bg-white/20 text-white text-[10px] md:text-sm font-medium transition-all w-auto md:w-full md:text-left"
          title="My Appointments">
          <i data-lucide="calendar-days" class="w-6 h-6 md:w-5 md:h-5 text-white shrink-0"></i>
          <span class="mt-1 md:mt-0 font-medium whitespace-nowrap">Appointments</span>
        </button>

        <button onclick="goToProfile()"
          class="flex flex-col md:flex-row items-center md:gap-3 px-3 md:px-4 py-2 md:py-3 rounded-xl text-white/75 hover:bg-white/10 hover:text-white text-[10px] md:text-sm font-medium transition-all w-auto md:w-full md:text-left"
          title="Profile">
          <i data-lucide="user" class="w-6 h-6 md:w-5 md:h-5 shrink-0"></i>
          <span class="mt-1 md:mt-0 font-medium whitespace-nowrap">Profile</span>
        </button>

        <div class="hidden md:block mt-auto border-t border-white/10 pt-3"></div>
        
        <button type="button" onclick="logoutPatient()"
          class="flex flex-col md:flex-row items-center md:gap-3 px-3 md:px-4 py-2 md:py-3 rounded-xl text-white/65 hover:bg-white/10 hover:text-white text-[10px] md:text-sm font-medium transition-all w-auto md:w-full md:text-left md:justify-start"
          title="Logout">
          <i data-lucide="log-out" class="w-6 h-6 md:w-5 md:h-5 shrink-0"></i>
          <span class="mt-1 md:mt-0 font-medium whitespace-nowrap">Logout</span>
        </button>
      </nav>
    </aside>

    <main class="flex-1 p-3 md:p-6 pb-20 md:pb-6 w-full overflow-x-hidden">
      <div class="max-w-7xl mx-auto bg-white rounded-[24px] shadow-[0_20px_60px_rgba(15,23,42,0.08)] p-4 md:p-6">
        <div class="mb-5">
          <div class="flex items-center justify-between gap-3">
            <h1 class="text-2xl md:text-3xl font-bold text-slate-800 leading-tight">Appointments</h1>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
              </svg>
              <input
                id="searchInput"
                type="text"
                placeholder="Search doctor or specialization..."
                class="pl-9 pr-4 py-2 w-56 text-xs border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#007E85]/30 focus:border-[#007E85] bg-slate-50 transition"
              />
            </div>
          </div>
        </div>

        <section id="bookingSection" class="bg-white rounded-[24px] p-0 mb-6 relative overflow-hidden shadow-[0_15px_40px_rgba(15,23,42,0.08)] border border-slate-100">
          <iframe
            id="bookingIframe"
            src="booking.html"
            class="w-full border-0 block"
            title="Book Appointment"
            scrolling="no"
            onload="fitBookingIframe(this)"
          ></iframe>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-3 gap-5">
          <div class="lg:col-span-2 bg-white rounded-[20px] p-5 border border-slate-100 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-5">
              <div>
                <h2 class="text-lg font-semibold text-slate-800">Appointments</h2>
                <p class="text-xs text-slate-500 mt-1">Your upcoming and past visits</p>
              </div>
              <div class="flex flex-wrap gap-1.5">
                <button class="filter-btn active-filter bg-[#007E85] text-white px-3 py-2 rounded-xl text-xs font-medium" data-filter="all">All</button>
                <button class="filter-btn bg-slate-100 text-slate-700 px-3 py-2 rounded-xl text-xs font-medium hover:bg-slate-200 transition" data-filter="upcoming">Upcoming</button>
                <button class="filter-btn bg-slate-100 text-slate-700 px-3 py-2 rounded-xl text-xs font-medium hover:bg-slate-200 transition" data-filter="completed">Completed</button>
                <button class="filter-btn bg-slate-100 text-slate-700 px-3 py-2 rounded-xl text-xs font-medium hover:bg-slate-200 transition" data-filter="missed">Missed</button>
              </div>
            </div>

            <div id="appointmentList" class="space-y-3 min-h-[80px]"></div>
            <div id="emptyState" class="hidden text-center py-10 text-slate-400 text-sm">
              No appointments found.
            </div>
          </div>

          <div class="bg-white rounded-[20px] p-5 border border-slate-100 shadow-sm h-fit">
            <h3 class="text-base font-semibold text-slate-800 mb-4">
              Summary
            </h3>
            <div class="space-y-4">
              <div class="pb-4 border-b border-slate-100">
                <p class="text-[11px] font-medium text-slate-500 uppercase tracking-wider">Total</p>
                <p id="totalCount" class="text-2xl font-bold text-slate-800 mt-1">...</p>
              </div>
              <div>
                <p class="text-[11px] font-medium text-slate-500 uppercase tracking-wider">Next Visit</p>
                <p id="nextAppointment" class="text-xs font-semibold text-[#007E85] mt-1">...</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div id="bookingModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
    <div id="bookingModalInner" class="bg-white w-full max-w-3xl max-h-[90vh] rounded-2xl shadow-2xl relative overflow-hidden">
      <button onclick="closeBookingModal()"
        class="absolute top-3 right-3 z-10 w-8 h-8 rounded-full bg-white shadow flex items-center justify-center text-sm">
        ✕
      </button>

      <iframe
        id="bookingModalIframe"
        src=""
        class="w-full border-0 block"
        scrolling="no"
        onload="fitModalIframe(this)"
      ></iframe>
    </div>
  </div>

  <div id="detailModal" class="fixed inset-0 z-[80] hidden items-center justify-center bg-black/40 p-4">
    <div class="bg-white w-full max-w-md rounded-[20px] shadow-2xl p-5 relative max-h-[90vh] overflow-y-auto">
      <button type="button" id="closeDetailModal"
        class="absolute top-3 right-3 w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 text-xs flex items-center justify-center">
        ✕
      </button>
      <h3 class="text-lg font-bold text-slate-800 mb-3 pr-8">
        Appointment details
      </h3>
      <div id="detailModalBody" class="text-sm overflow-hidden" style="word-break:break-word;overflow-wrap:break-word;"></div>
      <button type="button" id="detailRescheduleBtn"
        class="hidden mt-4 w-full py-2.5 rounded-xl bg-[#007E85] text-white text-sm font-medium hover:bg-[#006570]">
        Reschedule visit
      </button>
    </div>
  </div>

  <!-- ===== FEEDBACK MODAL ===== -->
  <div id="feedbackModal" class="fixed inset-0 z-[80] hidden items-center justify-center bg-black/40 p-4 backdrop-blur-sm">
    <div class="bg-white w-full max-w-sm rounded-[24px] shadow-2xl relative overflow-hidden">

      <!-- Close btn -->
      <button type="button" onclick="closeFeedbackModal()"
        class="absolute top-3 right-3 z-10 w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 transition flex items-center justify-center">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>

      <!-- ── VIEW PANEL ── -->
      <div id="fbViewPanel" class="hidden p-6">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-5">
          <div class="w-11 h-11 rounded-full bg-teal-50 flex items-center justify-center shrink-0">
            <i data-lucide="message-circle" class="w-5 h-5 text-[#007E85]"></i>
          </div>
          <div>
            <h3 class="text-base font-bold text-slate-800">My Feedback</h3>
            <p class="text-xs text-slate-400 mt-0.5">For <span id="fb-view-doctor" class="font-semibold text-[#007E85]"></span></p>
          </div>
        </div>

        <!-- Stars removed: text-only feedback -->

        <!-- Quote card -->
        <div class="relative bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 mb-5">
          <svg class="absolute top-3 left-3 w-5 h-5 text-slate-200" fill="currentColor" viewBox="0 0 24 24">
            <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/>
          </svg>
          <p id="fb-view-text" class="text-sm text-slate-600 leading-relaxed pl-6 break-words" style="overflow-wrap:anywhere;"></p>
        </div>

        <!-- Edit button -->
        <button type="button" onclick="switchToEditMode()"
          class="w-full flex items-center justify-center gap-2 py-2.5 rounded-xl bg-amber-400 hover:bg-amber-500 text-white text-sm font-bold transition shadow-sm">
          <i data-lucide="pencil" class="w-4 h-4"></i>
          Edit Feedback
        </button>
      </div>

      <!-- ── WRITE / EDIT PANEL ── -->
      <div id="fbWritePanel" class="hidden p-6">
        <!-- Header -->
        <div class="flex items-center gap-3 mb-5">
          <div class="w-11 h-11 rounded-full bg-amber-50 flex items-center justify-center shrink-0">
            <i data-lucide="star" class="w-5 h-5 text-amber-400"></i>
          </div>
          <div>
            <h3 id="fb-write-title" class="text-base font-bold text-slate-800">Leave Feedback</h3>
            <p class="text-xs text-slate-400 mt-0.5">For <span id="fb-write-doctor" class="font-semibold text-slate-700"></span></p>
          </div>
        </div>

        <!-- Textarea -->
        <div class="mb-5">
          <p class="text-xs text-slate-500 mb-2">Your experience</p>
          <textarea id="feedback-text" rows="4"
            class="w-full border border-slate-200 rounded-xl p-3 text-sm text-slate-700 focus:ring-2 focus:ring-[#007E85]/30 focus:border-[#007E85] outline-none transition resize-none"
            placeholder="Share details about your experience..."></textarea>
        </div>

        <input type="hidden" id="feedback-apt-id" value="">
        <input type="hidden" id="feedback-mode" value="new"> <!-- new | edit -->

        <div class="flex gap-2">
          <button type="button" id="fb-back-btn" onclick="switchToViewMode()" class="hidden px-4 py-2.5 rounded-xl border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50 transition">
            Cancel
          </button>
          <button type="button" onclick="submitFeedback()"
            id="submitFeedbackBtn"
            class="flex-1 py-2.5 rounded-xl bg-[#007E85] hover:bg-[#006570] text-white text-sm font-bold transition shadow-sm disabled:opacity-50">
            Submit Review
          </button>
        </div>
      </div>

    </div>
  </div>


  <script src="patient-common.js"></script>
  <script src="dashboard.js"></script>
  <script>
    lucide.createIcons();

    function fitBookingIframe(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const height = doc.documentElement.scrollHeight || doc.body.scrollHeight;
        iframe.style.height = height + 'px';
      } catch (e) {
        iframe.style.height = '340px';
      }
    }

    function fitModalIframe(iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const height = doc.documentElement.scrollHeight || doc.body.scrollHeight;
        const maxH = Math.floor(window.innerHeight * 0.88);
        const h = Math.min(height, maxH);
        iframe.style.height = h + 'px';
        const inner = document.getElementById('bookingModalInner');
        if (inner) inner.style.height = h + 'px';
      } catch (e) {
        iframe.style.height = '380px';
      }
    }
  </script>
  <div id="successToast" class="fixed inset-0 hidden items-center justify-center z-[70] bg-black/25 backdrop-blur-sm">
    <div
      class="bg-white rounded-[20px] shadow-[0_20px_60px_rgba(15,23,42,0.18)] px-6 py-5 w-[85%] max-w-xs text-center border border-emerald-100">
      <div class="mx-auto mb-3 w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-emerald-600" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <h3 class="toast-title text-lg font-bold text-slate-800 mb-1">
        Success
      </h3>
      <p class="toast-text text-slate-500 text-xs">
        Appointment booked successfully.
      </p>
    </div>
  </div>
  <!-- Security: Cache Prevention & Session Verification -->
  <script src="../../src/js/cache-prevention.js"></script>
</body>

</html>
