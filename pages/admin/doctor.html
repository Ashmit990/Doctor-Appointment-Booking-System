    <script>
      tailwind.config = {
        theme: {

    <style>
      * {
        font-family: "Poppins", sans-serif;
      }

      /* Modal Styles */
      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        z-index: 99999;
        align-items: center;
        justify-content: center;
      }

      .modal.active {
        display: flex !important;
      }

      .modal-content {
        background: white;
        border-radius: 1rem;
        max-width: 800px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        animation: modalFadeIn 0.3s ease-out;
      }

      @keyframes modalFadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 20px;
        background: #0d7377;
        color: white;
        border-radius: 8px;
        z-index: 100000;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      
      .doctor-name-btn {
        background: none;
        border: none;
        color: #0d7377;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
        padding: 0;
        font-size: 0.875rem;
      }
      
      .doctor-name-btn:hover {
        color: #0a5a5d;
        text-decoration: underline;
      }
    </style>
</head>
