    <!-- Main -->
    <main class="flex-1 flex flex-col lg:ml-60">
        <header class="bg-white px-4 md:px-8 py-4 flex items-center justify-between shadow-sm sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 transition-colors">
                    <svg class="w-5 h-5 text-teal-dark" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
                    </svg>
                </button>
                <h1 class="text-base font-semibold text-teal-dark">Appointments Management</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="current-date" class="text-xs text-gray-500 hidden sm:block"></span>
                <div class="w-9 h-9 bg-teal rounded-full flex items-center justify-center text-white font-bold text-sm cursor-pointer hover:bg-teal-dark transition-colors">A</div>
            </div>
        </header>

        <div class="p-4 md:p-8 flex-1 overflow-y-auto">
            <h2 class="text-2xl font-bold text-teal-dark mb-6">All Appointments</h2>

            <!-- Toolbar -->
            <div class="flex flex-col md:flex-row gap-4 mb-6">
                <div class="flex-1 flex items-center gap-2 bg-white border border-gray-200 rounded-xl px-4 py-2.5 shadow-sm">
                    <svg class="w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                    </svg>
                    <input id="searchInput" type="text" placeholder="Search appointments..." oninput="filterAppointments()" class="border-none outline-none text-sm w-full bg-transparent" />
                </div>
                <select id="statusFilter" onchange="filterAppointments()" class="bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium shadow-sm">
                    <option value="">All Status</option>
                    <option value="Upcoming">Upcoming</option>
                    <option value="Completed">Completed</option>
                    <option value="Missed">Missed</option>
                </select>
            </div>

            <!-- Table -->
            <div class="bg-white rounded-2xl shadow-md overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[800px]">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase">Patient</th>
                                <th class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase">Doctor</th>
                                <th class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase">Date & Time</th>
                                <th class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase">Status</th>
                                <th class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="appointments-table-body">
                            <tr>
                                <td colspan="5" class="text-center py-8 text-gray-500">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Pagination -->
            <div class="flex items-center justify-between mt-6">
                <p class="text-sm text-gray-600">Page <span id="current-page">1</span> of <span id="total-pages">1</span></p>
                <div class="flex gap-2">
                    <button onclick="previousPage()" class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Previous</button>
                    <button onclick="nextPage()" class="px-4 py-2 border border-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">Next</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="bg-white rounded-2xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-lg">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Edit Appointment</h2>
                <button onclick="closeEditModal()" class="p-2 hover:bg-gray-100 rounded">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" /></svg>
                </button>
            </div>
            <form onsubmit="saveAppointment(event)" id="editForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Status</label>
                    <select id="editStatus" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" required>
                        <option value="Upcoming">Upcoming</option>
                        <option value="Completed">Completed</option>
                        <option value="Missed">Missed</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Doctor Comments</label>
                    <textarea id="editComments" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" rows="3"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 bg-teal text-white py-2 rounded-lg font-semibold hover:bg-teal-dark transition-colors">Save Changes</button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-200 text-gray-800 py-2 rounded-lg font-semibold hover:bg-gray-300 transition-colors">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="appointments.js"></script>
</body>
</html>
