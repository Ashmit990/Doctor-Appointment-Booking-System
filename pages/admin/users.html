<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management – Healthcare</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              teal: {
                DEFAULT: "#0d7377",
                dark: "#0a5a5d",
                light: "#14a3a8",
                bg: "#e8f5f5",
              },
            },
            fontFamily: { poppins: ["Poppins", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-800 flex min-h-screen">
    <!-- Mobile overlay -->
    <div
      id="overlay"
      class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden"
      onclick="closeSidebar()"
    ></div>

    <!-- Sidebar -->
    <aside
      id="sidebar"
      class="fixed top-0 left-0 bottom-0 w-60 bg-teal-dark flex flex-col z-50 -translate-x-full lg:translate-x-0 transition-transform duration-300"
    >
      <div class="px-6 py-7 flex items-center gap-3 border-b border-white/10">
        <svg class="w-8 h-8 shrink-0" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,.15)" />
          <path
            d="M16 8v16M8 16h16"
            stroke="#fff"
            stroke-width="2.5"
            stroke-linecap="round"
          />
        </svg>
        <span class="text-white font-bold text-lg">Healthcare</span>
      </div>
      <nav class="p-3 flex-1">
        <a
          href="dashboard.html"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/75 hover:bg-white/10 hover:text-white text-sm font-medium mb-1 transition-all"
        >
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"
            />
          </svg>
          Dashboard
        </a>
        <a
          href="users.html"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-white bg-white/20 text-sm font-medium mb-1"
        >
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
            />
          </svg>
          Users
        </a>
        <a
          href="#"
          onclick="showToast('Appointments page coming soon!')"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/75 hover:bg-white/10 hover:text-white text-sm font-medium mb-1 transition-all"
        >
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"
            />
          </svg>
          Appointments
        </a>
        <a
          href="reports.html"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/75 hover:bg-white/10 hover:text-white text-sm font-medium mb-1 transition-all"
        >
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"
            />
          </svg>
          Reports
        </a>
        <a
          href="#"
          onclick="showToast('Doctors page coming soon!')"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/75 hover:bg-white/10 hover:text-white text-sm font-medium mb-1 transition-all"
        >
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
          Doctors
        </a>
      </nav>
      <div class="p-3 border-t border-white/10">
        <a
          href="#"
          onclick="showToast('Admin profile coming soon!')"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/65 hover:bg-white/10 hover:text-white text-sm font-medium transition-all"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
            />
          </svg>
          Admin Profile
        </a>
        <a
          href="#"
          onclick="confirmLogout()"
          class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/65 hover:bg-white/10 hover:text-white text-sm font-medium transition-all"
        >
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"
            />
          </svg>
          Logout
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col lg:ml-60">
      <header
        class="bg-white px-4 md:px-8 py-4 flex items-center justify-between shadow-sm sticky top-0 z-30"
      >
        <div class="flex items-center gap-3">
          <button
            onclick="toggleSidebar()"
            class="lg:hidden p-2 rounded-lg hover:bg-gray-100 transition-colors"
          >
            <svg
              class="w-5 h-5 text-teal-dark"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
          </button>
          <h1 class="text-base font-semibold text-teal-dark">
            User Management
          </h1>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-xs text-gray-500 hidden sm:block"
            >March 31, 2026</span
          >
          <div
            class="w-9 h-9 bg-teal rounded-full flex items-center justify-center text-white font-bold text-sm cursor-pointer hover:bg-teal-dark transition-colors"
            onclick="showToast('Admin profile clicked!')"
          >
            A
          </div>
        </div>
      </header>

      <div class="p-4 md:p-8">
        <!-- Toolbar -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
          <div class="flex flex-wrap gap-2">
            <div
              class="flex items-center gap-2 bg-white border border-gray-200 rounded-xl px-4 py-2.5 shadow-sm min-w-[200px] md:min-w-[240px]"
            >
              <svg
                class="w-4 h-4 text-gray-400 shrink-0"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
                />
              </svg>
              <input
                id="searchInput"
                type="text"
                placeholder="Search users..."
                oninput="filterUsers()"
                class="border-none outline-none font-poppins text-sm text-gray-800 w-full bg-transparent"
              />
            </div>
            <button
              onclick="showToast('Filter options coming soon!')"
              class="flex items-center gap-2 bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm font-medium text-gray-800 shadow-sm hover:bg-teal-bg transition-colors"
            >
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z" />
              </svg>
              Filter
            </button>
          </div>
          <button
            onclick="openAddUserModal()"
            class="flex items-center gap-2 bg-teal text-white rounded-xl px-5 py-2.5 text-sm font-semibold hover:bg-teal-dark transition-colors shadow-sm"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
            </svg>
            Add User
          </button>
        </div>

        <!-- Tabs -->
        <div
          class="flex gap-1 mb-5 bg-white rounded-xl p-1 shadow-sm w-fit overflow-x-auto"
        >
          <button
            onclick="switchTab(this, 'all')"
            class="tab-btn px-4 py-2 rounded-lg text-sm font-medium bg-teal text-white whitespace-nowrap transition-all"
          >
            All Users
          </button>
          <button
            onclick="switchTab(this, 'doctor')"
            class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-800 whitespace-nowrap transition-all"
          >
            Doctors
          </button>
          <button
            onclick="switchTab(this, 'patient')"
            class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-800 whitespace-nowrap transition-all"
          >
            Patients
          </button>
          <button
            onclick="switchTab(this, 'pending')"
            class="tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-800 whitespace-nowrap transition-all"
          >
            Pending Approval
          </button>
        </div>

        <!-- Table Card -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full min-w-[640px]" id="usersTable">
              <thead class="bg-gray-50">
                <tr>
                  <th
                    class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase tracking-wider"
                  >
                    User
                  </th>
                  <th
                    class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase tracking-wider"
                  >
                    Role
                  </th>
                  <th
                    class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase tracking-wider hidden md:table-cell"
                  >
                    Joined
                  </th>
                  <th
                    class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase tracking-wider"
                  >
                    Status
                  </th>
                  <th
                    class="text-left text-xs text-gray-400 font-semibold px-5 py-4 uppercase tracking-wider"
                  >
                    Actions
                  </th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <!-- Rows injected by JS -->
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <div
            class="flex flex-wrap items-center justify-between px-5 py-4 border-t border-gray-100 gap-3"
          >
            <span class="text-xs text-gray-400" id="pagInfo"
              >Showing 1–5 of 5 users</span
            >
            <div class="flex gap-1">
              <button
                onclick="showToast('Previous page')"
                class="w-8 h-8 rounded-lg border border-gray-200 text-sm flex items-center justify-center hover:bg-teal-bg transition-colors"
              >
                ‹
              </button>
              <button
                class="w-8 h-8 rounded-lg border bg-teal text-white border-teal text-sm flex items-center justify-center"
              >
                1
              </button>
              <button
                onclick="showToast('Page 2 coming soon!')"
                class="w-8 h-8 rounded-lg border border-gray-200 text-sm flex items-center justify-center hover:bg-teal-bg transition-colors"
              >
                2
              </button>
              <button
                onclick="showToast('Page 3 coming soon!')"
                class="w-8 h-8 rounded-lg border border-gray-200 text-sm flex items-center justify-center hover:bg-teal-bg transition-colors"
              >
                3
              </button>
              <button
                onclick="showToast('Next page')"
                class="w-8 h-8 rounded-lg border border-gray-200 text-sm flex items-center justify-center hover:bg-teal-bg transition-colors"
              >
                ›
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Toast -->
    <div
      id="toast"
      class="fixed bottom-6 right-6 bg-teal-dark text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium translate-y-20 opacity-0 transition-all duration-300 z-50 max-w-xs"
    ></div>

    <!-- Add User Modal -->
    <div
      id="addUserModal"
      class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4"
    >
      <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
        <h3 class="font-bold text-lg text-gray-800 mb-5">Add New User</h3>
        <div class="flex flex-col gap-4">
          <div>
            <label
              class="text-xs font-semibold text-gray-500 mb-1 block uppercase tracking-wide"
              >Full Name</label
            >
            <input
              id="newName"
              type="text"
              placeholder="e.g. Dr. John Doe"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal transition-colors"
            />
          </div>
          <div>
            <label
              class="text-xs font-semibold text-gray-500 mb-1 block uppercase tracking-wide"
              >Email</label
            >
            <input
              id="newEmail"
              type="email"
              placeholder="email@example.com"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal transition-colors"
            />
          </div>
          <div>
            <label
              class="text-xs font-semibold text-gray-500 mb-1 block uppercase tracking-wide"
              >Role</label
            >
            <select
              id="newRole"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-teal transition-colors bg-white"
            >
              <option value="patient">Patient</option>
              <option value="doctor">Doctor</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <div class="flex gap-3 mt-6">
          <button
            onclick="closeAddUserModal()"
            class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm font-semibold hover:bg-gray-50 transition-colors"
          >
            Cancel
          </button>
          <button
            onclick="addUser()"
            class="flex-1 px-4 py-2.5 rounded-xl bg-teal text-white text-sm font-semibold hover:bg-teal-dark transition-colors"
          >
            Add User
          </button>
        </div>
      </div>
    </div>

    <!-- View User Modal -->
    <div
      id="viewModal"
      class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4"
    >
      <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
        <h3 class="font-bold text-lg text-gray-800 mb-4">User Details</h3>
        <div
          id="viewContent"
          class="text-sm text-gray-600 space-y-2 mb-6"
        ></div>
        <button
          onclick="closeViewModal()"
          class="w-full px-4 py-2.5 rounded-xl bg-teal text-white text-sm font-semibold hover:bg-teal-dark transition-colors"
        >
          Close
        </button>
      </div>
    </div>

    <!-- Logout Modal -->
    <div
      id="logoutModal"
      class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4"
    >
      <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
        <h3 class="font-bold text-lg text-gray-800 mb-2">Confirm Logout</h3>
        <p class="text-sm text-gray-500 mb-6">
          Are you sure you want to log out?
        </p>
        <div class="flex gap-3">
          <button
            onclick="closeLogout()"
            class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm font-semibold hover:bg-gray-50 transition-colors"
          >
            Cancel
          </button>
          <button
            onclick="
              showToast('Logged out successfully!');
              closeLogout();
            "
            class="flex-1 px-4 py-2.5 rounded-xl bg-teal text-white text-sm font-semibold hover:bg-teal-dark transition-colors"
          >
            Logout
          </button>
        </div>
      </div>
    </div>

    <script>
      const colors = [
        "#0d7377",
        "#1d8a4f",
        "#d96c0a",
        "#6e3fcf",
        "#2a5dcf",
        "#c0392b",
      ];
      let activeTab = "all";

      const allUsers = [
        {
          initials: "AS",
          color: "#0d7377",
          name: "Aarav Sharma",
          email: "aarav@email.com",
          role: "patient",
          joined: "Jan 10, 2026",
          status: "active",
        },
        {
          initials: "PK",
          color: "#1d8a4f",
          name: "Dr. Priya Koirala",
          email: "priya.doc@email.com",
          role: "doctor",
          joined: "Feb 3, 2026",
          status: "pending",
        },
        {
          initials: "ST",
          color: "#d96c0a",
          name: "Sita Thapa",
          email: "sita@email.com",
          role: "patient",
          joined: "Mar 15, 2026",
          status: "active",
        },
        {
          initials: "RM",
          color: "#6e3fcf",
          name: "Dr. Rajan Mehta",
          email: "rajan.doc@email.com",
          role: "doctor",
          joined: "Dec 20, 2025",
          status: "active",
        },
        {
          initials: "NL",
          color: "#0d7377",
          name: "Nisha Lama",
          email: "nisha@email.com",
          role: "patient",
          joined: "Mar 1, 2026",
          status: "inactive",
        },
      ];

      const roleStyles = {
        admin: "bg-purple-100 text-purple-700",
        doctor: "bg-teal-bg text-teal",
        patient: "bg-blue-100 text-blue-700",
      };
      const statusStyles = {
        active: "bg-green-100 text-green-700",
        pending: "bg-orange-100 text-orange-600",
        inactive: "bg-gray-100 text-gray-500",
      };

      function renderUsers(users) {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        if (!users.length) {
          tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-gray-400 text-sm">No users found.</td></tr>`;
          document.getElementById("pagInfo").textContent = "Showing 0 users";
          return;
        }
        document.getElementById("pagInfo").textContent =
          `Showing 1–${users.length} of ${users.length} users`;
        users.forEach((u, i) => {
          const isPending = u.status === "pending";
          const isInactive = u.status === "inactive";
          let actions = "";
          if (isPending) {
            actions = `
            <button onclick="approveUser(${i})" title="Approve" class="w-8 h-8 rounded-lg bg-green-100 text-green-700 flex items-center justify-center hover:bg-green-700 hover:text-white transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </button>
            <button onclick="rejectUser(${i})" title="Reject" class="w-8 h-8 rounded-lg bg-red-100 text-red-600 flex items-center justify-center hover:bg-red-600 hover:text-white transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
            <button onclick="viewUser(${i})" title="View" class="w-8 h-8 rounded-lg bg-teal-bg text-teal flex items-center justify-center hover:bg-teal hover:text-white transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>`;
          } else if (isInactive) {
            actions = `
            <button onclick="activateUser(${i})" title="Activate" class="w-8 h-8 rounded-lg bg-green-100 text-green-700 flex items-center justify-center hover:bg-green-700 hover:text-white transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </button>
            <button onclick="viewUser(${i})" title="View" class="w-8 h-8 rounded-lg bg-teal-bg text-teal flex items-center justify-center hover:bg-teal hover:text-white transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>`;
          } else {
            actions = `
            <button onclick="viewUser(${i})" title="View" class="w-8 h-8 rounded-lg bg-teal-bg text-teal flex items-center justify-center hover:bg-teal hover:text-white transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
            <button onclick="deactivateUser(${i})" title="Deactivate" class="w-8 h-8 rounded-lg bg-red-100 text-red-600 flex items-center justify-center hover:bg-red-600 hover:text-white transition-colors">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm6.31-3.1L7.1 5.69C8.45 4.63 10.15 4 12 4c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9z"/></svg>
            </button>`;
          }
          tbody.innerHTML += `
          <tr class="border-t border-gray-100 hover:bg-gray-50 transition-colors">
            <td class="px-5 py-3.5">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-xs shrink-0" style="background:${u.color}">${u.initials}</div>
                <div>
                  <div class="font-semibold text-sm">${u.name}</div>
                  <div class="text-xs text-gray-400">${u.email}</div>
                </div>
              </div>
            </td>
            <td class="px-5 py-3.5"><span class="inline-block px-2.5 py-0.5 rounded-md text-xs font-semibold ${roleStyles[u.role] || "bg-gray-100 text-gray-600"}">${u.role.charAt(0).toUpperCase() + u.role.slice(1)}</span></td>
            <td class="px-5 py-3.5 text-sm text-gray-600 hidden md:table-cell">${u.joined}</td>
            <td class="px-5 py-3.5"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-semibold ${statusStyles[u.status]}">${u.status.charAt(0).toUpperCase() + u.status.slice(1)}</span></td>
            <td class="px-5 py-3.5"><div class="flex gap-1.5">${actions}</div></td>
          </tr>`;
        });
      }

      function getFilteredUsers() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        return allUsers.filter((u) => {
          const matchTab =
            activeTab === "all" ||
            u.role === activeTab ||
            (activeTab === "pending" && u.status === "pending");
          const matchSearch =
            u.name.toLowerCase().includes(q) ||
            u.email.toLowerCase().includes(q);
          return matchTab && matchSearch;
        });
      }

      function filterUsers() {
        renderUsers(getFilteredUsers());
      }

      function switchTab(btn, tab) {
        activeTab = tab;
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("bg-teal", "text-white"));
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.add("text-gray-500"));
        btn.classList.add("bg-teal", "text-white");
        btn.classList.remove("text-gray-500");
        filterUsers();
      }

      function viewUser(i) {
        const users = getFilteredUsers();
        const u = users[i];
        document.getElementById("viewContent").innerHTML = `
        <p><strong>Name:</strong> ${u.name}</p>
        <p><strong>Email:</strong> ${u.email}</p>
        <p><strong>Role:</strong> ${u.role}</p>
        <p><strong>Joined:</strong> ${u.joined}</p>
        <p><strong>Status:</strong> ${u.status}</p>`;
        document.getElementById("viewModal").classList.remove("hidden");
      }
      function closeViewModal() {
        document.getElementById("viewModal").classList.add("hidden");
      }

      function approveUser(i) {
        const users = getFilteredUsers();
        const name = users[i].name;
        const idx = allUsers.findIndex((u) => u.email === users[i].email);
        if (idx > -1) allUsers[idx].status = "active";
        filterUsers();
        showToast(`${name} has been approved!`);
      }
      function rejectUser(i) {
        const users = getFilteredUsers();
        const name = users[i].name;
        const idx = allUsers.findIndex((u) => u.email === users[i].email);
        if (idx > -1) allUsers.splice(idx, 1);
        filterUsers();
        showToast(`${name} has been rejected.`);
      }
      function deactivateUser(i) {
        const users = getFilteredUsers();
        const name = users[i].name;
        const idx = allUsers.findIndex((u) => u.email === users[i].email);
        if (idx > -1) allUsers[idx].status = "inactive";
        filterUsers();
        showToast(`${name} has been deactivated.`);
      }
      function activateUser(i) {
        const users = getFilteredUsers();
        const name = users[i].name;
        const idx = allUsers.findIndex((u) => u.email === users[i].email);
        if (idx > -1) allUsers[idx].status = "active";
        filterUsers();
        showToast(`${name} has been activated!`);
      }

      function openAddUserModal() {
        document.getElementById("addUserModal").classList.remove("hidden");
      }
      function closeAddUserModal() {
        document.getElementById("addUserModal").classList.add("hidden");
      }
      function addUser() {
        const name = document.getElementById("newName").value.trim();
        const email = document.getElementById("newEmail").value.trim();
        const role = document.getElementById("newRole").value;
        if (!name || !email) {
          showToast("Please fill in all fields.");
          return;
        }
        const initials = name
          .split(" ")
          .map((w) => w[0])
          .join("")
          .toUpperCase()
          .slice(0, 2);
        const color = colors[Math.floor(Math.random() * colors.length)];
        allUsers.push({
          initials,
          color,
          name,
          email,
          role,
          joined: "Mar 31, 2026",
          status: role === "doctor" ? "pending" : "active",
        });
        filterUsers();
        closeAddUserModal();
        document.getElementById("newName").value = "";
        document.getElementById("newEmail").value = "";
        showToast(`${name} added successfully!`);
      }

      function confirmLogout() {
        document.getElementById("logoutModal").classList.remove("hidden");
      }
      function closeLogout() {
        document.getElementById("logoutModal").classList.add("hidden");
      }
      function toggleSidebar() {
        document
          .getElementById("sidebar")
          .classList.toggle("-translate-x-full");
        document.getElementById("overlay").classList.toggle("hidden");
      }
      function closeSidebar() {
        document.getElementById("sidebar").classList.add("-translate-x-full");
        document.getElementById("overlay").classList.add("hidden");
      }
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.remove("translate-y-20", "opacity-0");
        t.classList.add("translate-y-0", "opacity-100");
        setTimeout(() => {
          t.classList.add("translate-y-20", "opacity-0");
          t.classList.remove("translate-y-0", "opacity-100");
        }, 3000);
      }

      // Init
      renderUsers(allUsers);
    </script>
  </body>
</html>
