    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 20px;
        background: #0d7377;
        color: white;
        border-radius: 8px;
        z-index: 1000;
        animation: fadeIn 0.3s ease;
      }
      .toast.error {
        background: #dc2626;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Admin ID Verification Modal */
      #verifyModal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 200;
        align-items: center;
        justify-content: center;
      }
      #verifyModal.active {
        display: flex;
      }

      <div class="p-3 border-t border-white/10">
        <a

        >
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"

          </svg>

        <a

    <!-- Main -->
    <main class="flex-1 flex flex-col lg:ml-60">
      <header
        class="bg-white px-4 md:px-8 py-4 flex items-center justify-between shadow-sm sticky top-0 z-30"
      >
        <div class="flex items-center gap-3">
          <button
            onclick="toggleSidebar()"
            class="lg:hidden p-2 rounded-lg hover:bg-gray-100"
          >
            <svg
              class="w-5 h-5 text-teal-dark"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
          </button>
          <h1 class="text-base font-semibold text-teal-dark">Admin Profile</h1>
        </div>
        <div class="flex items-center gap-4">
          <span
            id="current-date"
            class="text-xs text-gray-500 hidden sm:block"
          ></span>
          <div
            class="w-9 h-9 bg-teal rounded-full flex items-center justify-center text-white font-bold text-sm"
          >
            A
          </div>
        </div>
      </header>

      <!-- Centered content -->
      <div class="flex-1 flex items-center justify-center p-4 md:p-8">
        <div class="w-full max-w-xl">
          <div class="bg-white rounded-2xl shadow-md p-8">
            <!-- Avatar -->
            <div class="flex justify-center mb-6">
              <div
                class="w-24 h-24 bg-teal rounded-full flex items-center justify-center text-white text-4xl font-bold shadow-lg"
              >
                A
              </div>
            </div>
            <h2
              class="text-2xl font-bold text-center text-teal-dark mb-1"
              id="profileName"
            >
              Admin
            </h2>
            <p class="text-center text-gray-500 text-sm mb-8" id="profileEmail">
              admin@healthcare.com
            </p>

            <form id="profileForm" class="space-y-4">
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2"
                  >Full Name</label
                >
                <input
                  id="fullName"
                  type="text"
                  class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal"
                  required
                />
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2"
                  >Email Address</label
                >
                <input
                  id="email"
                  type="email"
                  class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal"
                  required
                />
              </div>

              <div class="pt-2">
                <h3
                  class="text-base font-semibold text-gray-800 mb-4 border-t pt-4"
                >
                  Change Password
                </h3>
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2"
                  >Current Password</label
                >
                <input
                  id="currentPassword"
                  type="password"
                  class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal"
                  placeholder="Required for verification"
                />
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2"
                  >New Password
                  <span class="text-gray-400 font-normal"
                    >(Optional)</span
                  ></label
                >
                <input
                  id="newPassword"
                  type="password"
                  class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal"
                  placeholder="Leave blank if no change"
                />
              </div>
              <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2"
                  >Confirm New Password</label
                >
                <input
                  id="confirmPassword"
                  type="password"
                  class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal"
                  placeholder="Leave blank if no change"
                />
              </div>

              <div class="flex gap-3 pt-6">
                <button
                  type="button"
                  onclick="openVerifyModal()"
                  class="flex-1 bg-teal text-white py-3 rounded-lg font-semibold hover:bg-teal-dark transition-colors"
                >
                  Save Changes
                </button>
                <button
                  type="button"
                  onclick="resetForm()"
                  class="flex-1 bg-gray-200 text-gray-800 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors"
                >
                  Cancel
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <!-- ====== Admin ID Verification Modal ====== -->
    <div id="verifyModal" class="active" style="display: none">
      <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm mx-4">
        <!-- Lock icon -->
        <div class="flex justify-center mb-4">
          <div
            class="w-16 h-16 bg-teal-bg rounded-full flex items-center justify-center"
          >
            <svg
              class="w-8 h-8 text-teal-dark"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"
              />
            </svg>
          </div>
        </div>

        <h3 class="text-xl font-bold text-center text-gray-800 mb-1">
          Verify Your Identity
        </h3>
        <p class="text-sm text-center text-gray-500 mb-6">
          Enter your Admin ID to confirm changes
        </p>

        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2"
            >Admin ID</label
          >
          <input
            id="adminIdInput"
            type="text"
            placeholder="e.g. ADM_001"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-teal focus:ring-1 focus:ring-teal"
            onkeydown="if (event.key === 'Enter') confirmAndSave();"
          />
          <p id="adminIdError" class="text-red-500 text-xs mt-1 hidden">
            Incorrect Admin ID. Please try again.
          </p>
        </div>

        <div class="flex gap-3">
          <button
            onclick="confirmAndSave()"
            class="flex-1 bg-teal text-white py-3 rounded-lg font-semibold hover:bg-teal-dark transition-colors"
          >
            Confirm
          </button>
          <button
            onclick="closeVerifyModal()"
            class="flex-1 bg-gray-200 text-gray-800 py-3 rounded-lg font-semibold hover:bg-gray-300 transition-colors"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script>
      // ==================== DATE ====================
      function updateCurrentDate() {
        const options = {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        };
        document.getElementById("current-date").textContent =
          new Date().toLocaleDateString("en-US", options);
      }

      // ==================== LOAD PROFILE ====================
      async function loadProfile() {
        try {
          const response = await fetch("../../api/admin/profile.php");
          const result = await response.json();
          if (result.status === "success") {
            document.getElementById("fullName").value = result.data.full_name;
            document.getElementById("email").value = result.data.email;
            document.getElementById("profileName").textContent =
              result.data.full_name;
            document.getElementById("profileEmail").textContent =
              result.data.email;
          }
        } catch (error) {
          showToast("Error loading profile", true);
        }
      }

      // ==================== VERIFY MODAL ====================
      function openVerifyModal() {
        // Basic client-side validation before showing modal
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;
        const currentPassword =
          document.getElementById("currentPassword").value;

        if (newPassword && newPassword !== confirmPassword) {
          showToast("New passwords do not match", true);
          return;
        }
        if (!currentPassword) {
          showToast("Current password is required", true);
          return;
        }

        // Show the modal
        document.getElementById("adminIdInput").value = "";
        document.getElementById("adminIdError").classList.add("hidden");
        document.getElementById("verifyModal").style.display = "flex";
        setTimeout(() => document.getElementById("adminIdInput").focus(), 100);
      }

      function closeVerifyModal() {
        document.getElementById("verifyModal").style.display = "none";
        document.getElementById("adminIdInput").value = "";
        document.getElementById("adminIdError").classList.add("hidden");
      }

      async function confirmAndSave() {
        const enteredId = document.getElementById("adminIdInput").value.trim();

        if (!enteredId) {
          document.getElementById("adminIdError").textContent =
            "Please enter your Admin ID.";
          document.getElementById("adminIdError").classList.remove("hidden");
          return;
        }

        // Verify Admin ID against the database via PHP
        try {
          const verifyRes = await fetch("../../api/admin/verify_admin_id.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ admin_id: enteredId }),
          });
          const verifyResult = await verifyRes.json();

          if (!verifyResult.valid) {
            document.getElementById("adminIdError").textContent =
              "Incorrect Admin ID. Please try again.";
            document.getElementById("adminIdError").classList.remove("hidden");
            document.getElementById("adminIdInput").focus();
            return;
          }
        } catch (err) {
          // Fallback: if you don't have the PHP endpoint yet, do a simple frontend check
          // Remove this block once verify_admin_id.php is set up
          const ADMIN_ID = "ADM_001"; // matches your database
          if (enteredId !== ADMIN_ID) {
            document.getElementById("adminIdError").textContent =
              "Incorrect Admin ID. Please try again.";
            document.getElementById("adminIdError").classList.remove("hidden");
            document.getElementById("adminIdInput").focus();
            return;
          }
        }

        // ID is correct — proceed with saving
        closeVerifyModal();
        await saveProfile();
      }

      // ==================== SAVE PROFILE ====================
      async function saveProfile() {
        const fullName = document.getElementById("fullName").value;
        const email = document.getElementById("email").value;
        const currentPassword =
          document.getElementById("currentPassword").value;
        const newPassword = document.getElementById("newPassword").value;

        try {
          const formData = new FormData();
          formData.append("full_name", fullName);
          formData.append("email", email);
          formData.append("current_password", currentPassword);
          if (newPassword) formData.append("new_password", newPassword);

          const response = await fetch("../../api/admin/profile.php", {
            method: "PUT",
            body: formData,
          });
          const result = await response.json();

          if (result.status === "success") {
            showToast("Profile updated successfully!");
            document.getElementById("profileName").textContent = fullName;
            document.getElementById("profileEmail").textContent = email;
            document.getElementById("currentPassword").value = "";
            document.getElementById("newPassword").value = "";
            document.getElementById("confirmPassword").value = "";
          } else {
            showToast(result.message || "Error updating profile", true);
          }
        } catch (error) {
          showToast("Error updating profile", true);
        }
      }

      // ==================== RESET ====================
      function resetForm() {
        loadProfile();
        document.getElementById("currentPassword").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmPassword").value = "";
      }

      // ==================== TOAST ====================
      function showToast(message, isError = false) {
        const toast = document.createElement("div");
        toast.className = "toast" + (isError ? " error" : "");
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      // ==================== SIDEBAR ====================
      function toggleSidebar() {
        document
          .getElementById("sidebar")
          .classList.toggle("-translate-x-full");
        document.getElementById("overlay").classList.toggle("hidden");
      }

      function closeSidebar() {
        document.getElementById("sidebar").classList.add("-translate-x-full");
        document.getElementById("overlay").classList.add("hidden");
      }

      // ==================== INIT ====================
      document.addEventListener("DOMContentLoaded", () => {
        updateCurrentDate();
        loadProfile();
      });
    </script>
  </body>
