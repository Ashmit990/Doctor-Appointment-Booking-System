        </nav>
        <div class="p-3 border-t border-white/10">
            <a href="adminprofile.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white bg-white/20 text-sm font-medium mb-1"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" /></svg>Admin Profile</a>
            <a href="../../api/auth/logout.php" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/65 hover:bg-white/10 text-sm font-medium transition-all"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z" /></svg>Logout</a>
        </div>

    <main class="flex-1 flex flex-col lg:ml-60">
        <header class="bg-white px-4 md:px-8 py-4 flex items-center justify-between shadow-sm sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100"><svg class="w-5 h-5 text-teal-dark" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" /></svg></button>
                <h1 class="text-base font-semibold text-teal-dark">Admin Profile</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="current-date" class="text-xs text-gray-500 hidden sm:block"></span>
                <div class="w-9 h-9 bg-teal rounded-full flex items-center justify-center text-white font-bold text-sm">A</div>
            </div>
        </header>
        <div class="p-4 md:p-8 flex-1 overflow-y-auto max-h-screen">
            <div class="max-w-2xl">
                <div class="bg-white rounded-2xl shadow-md p-8 mb-6">
                    <div class="flex justify-center mb-6">
                        <div class="w-24 h-24 bg-teal rounded-full flex items-center justify-center text-white text-4xl font-bold">A</div>
                    </div>
                    <h2 class="text-2xl font-bold text-center text-teal-dark mb-2" id="profileName">Admin</h2>
                    <p class="text-center text-gray-600 mb-8" id="profileEmail">admin@healthcare.com</p>
                    
                    <form onsubmit="updateProfile(event)" id="profileForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                            <input id="fullName" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm" required />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                            <input id="email" type="email" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm" required />
                        </div>
                        <div class="pt-4">
                            <h3 class="text-lg font-semibold text-gray-800 mb-4">Change Password</h3>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Current Password</label>
                            <input id="currentPassword" type="password" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm" placeholder="Required for verification" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">New Password (Optional)</label>
                            <input id="newPassword" type="password" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm" placeholder="Leave blank if no change" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm New Password</label>
                            <input id="confirmPassword" type="password" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm" placeholder="Leave blank if no change" />
                        </div>
                        <div class="flex gap-3 pt-6">
                            <button type="submit" class="flex-1 bg-teal text-white py-3 rounded-lg font-semibold hover:bg-teal-dark transition-colors">Save Changes</button>
                            <button type="button" onclick="resetForm()" class="flex-1 bg-gray-200 text-gray-800 py-3 rounded-lg font-semibold hover:bg-gray-300">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script>
        function updateCurrentDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', options);
        }

        async function loadProfile() {
            try {
                const response = await fetch('../../api/admin/profile.php');
                const result = await response.json();
                if (result.status === 'success') {
                    document.getElementById('fullName').value = result.data.full_name;
                    document.getElementById('email').value = result.data.email;
                    document.getElementById('profileName').textContent = result.data.full_name;
                    document.getElementById('profileEmail').textContent = result.data.email;
                }
            } catch (error) {
                showToast('Error loading profile');
            }
        }

        async function updateProfile(event) {
            event.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword && newPassword !== confirmPassword) {
                showToast('New passwords do not match');
                return;
            }

            if (!currentPassword) {
                showToast('Current password is required');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('full_name', fullName);
                formData.append('email', email);
                formData.append('current_password', currentPassword);
                if (newPassword) formData.append('new_password', newPassword);

                const response = await fetch('../../api/admin/profile.php', {
                    method: 'PUT',
                    body: formData
                });
                const result = await response.json();
                if (result.status === 'success') {
                    showToast('Profile updated successfully');
                    document.getElementById('profileName').textContent = fullName;
                    document.getElementById('profileEmail').textContent = email;
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    showToast(result.message || 'Error updating profile');
                }
            } catch (error) {
                showToast('Error updating profile');
            }
        }

        function resetForm() {
            loadProfile();
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('overlay').classList.add('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateCurrentDate();
            loadProfile();
        });
    </script>
</body>
</html>
