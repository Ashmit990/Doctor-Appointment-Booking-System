<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">

        <div class="flex gap-6 items-center" data-scroll-animation="animate-slide-up" data-delay="0.3s">
            <a href="./pages/auth/signup.html" class="font-lato font-semibold text-[18px] text-[#007E85] transition-colors hover:text-[#005E65]">Sign Up</a>
            <a href="./pages/auth/login.html" class="font-lato font-semibold text-[18px] bg-[#007E85] text-white px-8 py-3 rounded-lg transition-colors hover:bg-[#005E65]">Log In</a>
